# WARNING. DO NOT EDIT THIS FILE.
# To override settings from this file, you can copy and paste the relevant
# sections into your printer.cfg and change it there.

[idle_timeout]
gcode:
  {% if printer.webhooks.state|lower == 'ready' %}
    {% if printer.pause_resume.is_paused|lower == 'false' %}
	  _USER_BEFORE_IDLE_TIMEOUT
      RATICAL_ECHO PREFIX="IDLE" MSG="2 hours since last activity. Powering off heaters and motors.."
      TURN_OFF_HEATERS
      M84
	  _USER_AFTER_IDLE_TIMEOUT
    {% endif %}
  {% endif %}
# 2 hour timeout
timeout: 7200

[temperature_sensor raspberry_pi]
sensor_type: temperature_host

[skew_correction]

[named_offsets]

[input_shaper]

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]

[pause_resume]

[force_move]
enable_force_move: True

[respond]

[resonance_generator]

[ratical]
allow_unknown_gcode_generator: True

[exclude_object]

[bed_mesh]
split_delta_z: 0.01 # Avoid visible surface stripe artifacts

[fastconfig]
[stepper_x]
position_max: 300
position_endstop: -60.6
position_min: -60.6

[dual_carriage]
position_max: 360.6
position_endstop: 360.6
position_min: 0

[stepper_y]
position_max: 333.65
position_min: -14.35
position_endstop: -14.35

[stepper_z]
position_max: 300
position_min: -7   #VAOC Z endstop requires a little more Z travel

[bed_mesh]
horizontal_move_z: 2
mesh_min: 30,32.5
mesh_max: 270,262.5
probe_count: 20,20
mesh_pps: 2,2
algorithm: bicubic
bicubic_tension: .2

[z_tilt]
z_positions:
	0,0
	150,300
	300,0

points:
	20, 10
	280, 130
	20, 250
		
horizontal_move_z: 20
retries: 10
retry_tolerance: 0.02

# WARNING: DO NOT EDIT THIS FILE
# To override settings from this file, you can copy and paste the relevant
# sections into your printer.cfg and change it there.

#####
# CONFIGURATION VARIABLES
#####

[gcode_macro Ratical]
variable_calibrate_bed_mesh: True                # True|False = enable bed meshing
variable_adaptive_mesh: True                     # True|False = enable adaptive bed meshing

[gcode_macro _BED_MESH_SANITY_CHECK]
gcode:
	{% set zero_ref_pos = printer.fastconfig.settings.bed_mesh.zero_reference_position %}
	{% if zero_ref_pos is defined %}
		{% set safe_home_x, safe_home_y = printer.ratical.safe_home_position %}
		{% set beacon_contact_start_print_true_zero = true if printer["gcode_macro Ratical"].beacon_contact_start_print_true_zero|default(false)|lower == 'true' else false %}
		{% set beacon_contact_start_print_true_zero_fuzzy_position = true if printer["gcode_macro Ratical"].beacon_contact_start_print_true_zero_fuzzy_position|default(false)|lower == 'true' else false %}

		{% if printer.fastconfig.settings.beacon is defined and beacon_contact_start_print_true_zero %}
			{% if beacon_contact_start_print_true_zero_fuzzy_position %}
				CONSOLE_ECHO TYPE="error" TITLE="Defined zero reference not compatible with fuzzy true zero" MSG="Using fuzzy start print true zero position is not compatible with a defined zero_reference_position value in the [bed_mesh] section in printer.cfg._N_Please remove the zero_reference_position value from the [bed_mesh] section, or disable fuzzy true zero position in printer.cfg, like so:_N__N_[gcode_macro Ratical]_N_variable_beacon_contact_start_print_true_zero_fuzzy_position: False"
				_STOP_AND_RAISE_ERROR MSG="Defined zero reference not compatible with fuzzy true zero"
			{% elif zero_ref_pos[0]|float|round != safe_home_x|float|round or zero_ref_pos[1]|float|round != safe_home_y|float|round %}
				CONSOLE_ECHO TYPE="error" TITLE="Zero reference position does not match safe home position" MSG="Please update your bed mesh zero reference position in printer.cfg, like so:_N__N_[bed_mesh]_N_zero_reference_position: {safe_home_x|float|round},{safe_home_y|float|round}_N_"
				_STOP_AND_RAISE_ERROR MSG="Zero reference position does not match safe home position"
			{% endif %}
		{% endif %}
	{% endif %}

	{% set beacon_contact_bed_mesh = true if printer["gcode_macro Ratical"].beacon_contact_bed_mesh|default(false)|lower == 'true' else false %}
	{% set beacon_scan_method_automatic = true if printer["gcode_macro Ratical"].beacon_scan_method_automatic|default(false)|lower == 'true' else false %}
	{% set beacon_contact_z_tilt_adjust = true if printer["gcode_macro Ratical"].beacon_contact_z_tilt_adjust|default(false)|lower == 'true' else false %}

	{% if beacon_contact_bed_mesh %}
		CONSOLE_ECHO TYPE="warning" TITLE="Beacon contact bed mesh is enabled" MSG="Beacon contact bed mesh is enabled. This is not recommended for normal use and may result in inaccurate bed mesh calibration._N_Please disable it in your printer.cfg, like so:_N__N_[gcode_macro Ratical]_N_variable_beacon_contact_bed_mesh: False"
	{% endif %}

	{% if beacon_scan_method_automatic %}
		CONSOLE_ECHO TYPE="warning" TITLE="Beacon 'automatic' scan method is enabled" MSG="Beacon 'automatic' scan method is enabled. This is not recommended for normal use and may result in inaccurate bed mesh calibration._N_Please disable it in your printer.cfg, like so:_N__N_[gcode_macro Ratical]_N_variable_beacon_scan_method_automatic: False"
	{% endif %}

	{% if beacon_contact_z_tilt_adjust %}
		CONSOLE_ECHO TYPE="warning" TITLE="Beacon contact z-tilt adjust is enabled" MSG="Beacon contact z-tilt adjust is enabled. This is not recommended for normal use and may result in inaccurate z-tilt adjustment._N_Please disable it in your printer.cfg, like so:_N__N_[gcode_macro Ratical]_N_variable_beacon_contact_z_tilt_adjust: False"
	{% endif %}

[gcode_macro _START_PRINT_PREFLIGHT_CHECK_AND_RESET_BED_MESH]
gcode:
	SET_GCODE_VARIABLE MACRO=_START_PRINT_BED_MESH VARIABLE=actual_true_zero_position_x VALUE=None
	SET_GCODE_VARIABLE MACRO=_START_PRINT_BED_MESH VARIABLE=actual_true_zero_position_y VALUE=None
	# Error early if the scan compensation mesh is required but does not exist
	{% if printer.fastconfig.settings.beacon is defined %}
		_START_PRINT_PREFLIGHT_CHECK_BEACON_SCAN_COMPENSATION {rawparams}
	{% endif %}

[gcode_macro _START_PRINT_BED_MESH]
variable_actual_true_zero_position_x: None	# Internal use only! This supports the fuzzy true zero position feature.
variable_actual_true_zero_position_y: None	# Internal use only! This supports the fuzzy true zero position feature.
gcode:
	# Handle toolhead settings
	CACHE_TOOLHEAD_SETTINGS KEY="start_print_bed_mesh"
	SET_MACRO_TRAVEL_SETTINGS

	# parameter
	{% set idex_mode = params.IDEX_MODE|default('')|lower %}
	{% set X=[params.X0|default(-1)|float, params.X1|default(-1)|float] %}
	{% set Y=[params.Y0|default(-1)|float, params.Y1|default(-1)|float] %}

	DEBUG_ECHO PREFIX="_START_PRINT_BED_MESH" MSG="idex_mode: {idex_mode}, X: {X}, Y: {Y}"

	# config
	{% set printable_x_max = printer["gcode_macro Ratical"].printable_x_max|float %}
	{% set safe_home_x, safe_home_y = printer.ratical.safe_home_position %}
	{% set zero_ref_pos = printer.fastconfig.settings.bed_mesh.zero_reference_position %}
	{% if zero_ref_pos is not defined %}
		{% set zero_ref_pos = [safe_home_x if actual_true_zero_position_x is none else actual_true_zero_position_x, safe_home_y if actual_true_zero_position_y is none else actual_true_zero_position_y] %}
	{% endif %}


	{% if idex_mode == "copy" or idex_mode == "mirror" %}
		# in copy and mirror mode we mesh the whole x bed length of the print area
		# this is later needed for the live toohlead z-offset compensation
		# it should also be used for a sanity check
		# we should check if the secondary toolheads z-offset doesnt scratch the bed while shifting the toolheads and eventually raising the z-hop to prevent it
		{% set X=[0, printable_x_max] %}
	{% endif %}

	# beacon config
	{% set beacon_bed_mesh_scv = printer["gcode_macro Ratical"].beacon_bed_mesh_scv|default(25)|int %}
	{% set beacon_contact_bed_mesh_samples = printer["gcode_macro Ratical"].beacon_contact_bed_mesh_samples|default(2)|int %}
	{% set beacon_contact_bed_mesh = true if printer["gcode_macro Ratical"].beacon_contact_bed_mesh|default(false)|lower == 'true' else false %}
	{% set beacon_scan_method_automatic = true if printer["gcode_macro Ratical"].beacon_scan_method_automatic|default(false)|lower == 'true' else false %}
	{% if printer.fastconfig.settings.beacon is defined and not beacon_contact_bed_mesh %}
		SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY={beacon_bed_mesh_scv}
	{% endif %}

	# calibrate bed mesh
	{% set default_profile = printer["gcode_macro Ratical"].bed_mesh_profile|default('ratical') %}
	{% if printer["gcode_macro Ratical"].calibrate_bed_mesh|lower == 'true' %}
		BED_MESH_CLEAR
		{% if printer["gcode_macro Ratical"].adaptive_mesh|lower == 'true' %}
			CALIBRATE_ADAPTIVE_MESH PROFILE="{default_profile}" X0={X[0]} X1={X[1]} Y0={Y[0]} Y1={Y[1]} T={params.T|int} BOTH_TOOLHEADS={params.BOTH_TOOLHEADS} IDEX_MODE={idex_mode} ZERO_REF_POS_X={zero_ref_pos[0]} ZERO_REF_POS_Y={zero_ref_pos[1]}
		{% else %}
			{% if printer.fastconfig.settings.beacon is defined %}
				{% if beacon_contact_bed_mesh %}
					BED_MESH_CALIBRATE PROBE_METHOD=contact USE_CONTACT_AREA=1 SAMPLES={beacon_contact_bed_mesh_samples} PROFILE="{default_profile}"
				{% else %}
					{% if beacon_scan_method_automatic %}
						BED_MESH_CALIBRATE METHOD=automatic PROFILE="{default_profile}"
					{% else %}
						BED_MESH_CALIBRATE PROFILE="{default_profile}"
					{% endif %}
				{% endif %}
				_BEACON_APPLY_SCAN_COMPENSATION_IF_ENABLED
			{% else %}
				BED_MESH_CALIBRATE PROFILE="{default_profile}"
			{% endif %}
		{% endif %}
		BED_MESH_PROFILE LOAD="{default_profile}"

		SET_ZERO_REFERENCE_POSITION X={zero_ref_pos[0]} Y={zero_ref_pos[1]}

	{% elif printer["gcode_macro Ratical"].bed_mesh_profile is defined %}
		BED_MESH_CLEAR
		BED_MESH_PROFILE LOAD="{printer["gcode_macro Ratical"].bed_mesh_profile}"

		SET_ZERO_REFERENCE_POSITION X={zero_ref_pos[0]} Y={zero_ref_pos[1]}
	{% endif %}

	# Handle toolhead settings
	RESTORE_TOOLHEAD_SETTINGS KEY="start_print_bed_mesh"

[gcode_macro CALIBRATE_ADAPTIVE_MESH]
gcode:
	# config
	{% set printable_y_max = printer["gcode_macro Ratical"].printable_y_max|float %}
	{% set default_toolhead = printer["gcode_macro Ratical"].default_toolhead|default(0)|int %}

	# beacon config
	{% set beacon_contact_bed_mesh_samples = printer["gcode_macro Ratical"].beacon_contact_bed_mesh_samples|default(2)|int %}
	{% set beacon_contact_bed_mesh = true if printer["gcode_macro Ratical"].beacon_contact_bed_mesh|default(false)|lower == 'true' else false %}
	{% set beacon_scan_method_automatic = true if printer["gcode_macro Ratical"].beacon_scan_method_automatic|default(false)|lower == 'true' else false %}

	# idex mode
	{% set idex_mode = params.IDEX_MODE|default('')|lower %}
	{% set both_toolheads = true if params.BOTH_TOOLHEADS|default(true)|lower=='true' else false %}

	# get default mesh profile
	{% set default_profile = params.PROFILE %}

	# coordinates from the slicer start gcode
	{% set x0 = params.X0|default(-1)|float %}
	{% set y0 = params.Y0|default(-1)|float %}
	{% set x1 = params.X1|default(-1)|float %}
	{% set y1 = params.Y1|default(-1)|float %}

	RATICAL_ECHO PREFIX="Adaptive Mesh" MSG="Received coordinates X0={x0|round(1)} Y0={y0|round(1)} X1={x1|round(1)} Y1={y1|round(1)}"

	{% if x0 >= x1 or y0 >= y1 %}
		# coordinates are invalid, fall back to full bed mesh
		RATICAL_ECHO PREFIX="Adaptive Mesh" MSG="Invalid coordinates received. Please check your slicer settings. Falling back to full bed mesh."
		{% if printer.fastconfig.settings.beacon is defined %}
			{% if beacon_contact_bed_mesh %}
				BED_MESH_CALIBRATE PROBE_METHOD=contact USE_CONTACT_AREA=1 SAMPLES={beacon_contact_bed_mesh_samples} PROFILE="{default_profile}"
			{% else %}
				{% if beacon_scan_method_automatic %}
					BED_MESH_CALIBRATE METHOD=automatic PROFILE="{default_profile}"
				{% else %}
					BED_MESH_CALIBRATE PROFILE="{default_profile}"
				{% endif %}
				_BEACON_APPLY_SCAN_COMPENSATION_IF_ENABLED
			{% endif %}
		{% else %}
			BED_MESH_CALIBRATE PROFILE="{default_profile}"
		{% endif %}
	{% else %}
		# Zero reference position. If both values are specified, the mesh region will be expanded to include the zero reference position.
		# This is necessary so that SET_ZERO_REFERENCE_POSITION can meaningfully set the zero reference position for the mesh.
		{% if params.ZERO_REF_POS_X is defined and params.ZERO_REF_POS_Y is defined %}
			{% set zero_ref_pos_x = params.ZERO_REF_POS_X|float %}
			{% set zero_ref_pos_y = params.ZERO_REF_POS_Y|float %}
			{% if zero_ref_pos_x < x0 or zero_ref_pos_x > x1 or zero_ref_pos_y < y0 or zero_ref_pos_y > y1 %}
				RATICAL_ECHO PREFIX="Adaptive Mesh" MSG="Zero reference position X={zero_ref_pos_x|round(1)} Y={zero_ref_pos_y|round(1)} is outside the mesh region, expanding mesh region to include it."
				{% set x0 = [x0, zero_ref_pos_x]|min %}
				{% set y0 = [y0, zero_ref_pos_y]|min %}
				{% set x1 = [x1, zero_ref_pos_x]|max %}
				{% set y1 = [y1, zero_ref_pos_y]|max %}
			{% endif %}
		{% endif %}

		# get bed mesh config object
		{% set mesh_config = printer.fastconfig.config.bed_mesh %}

		# get configured bed mesh area
		{% set min_x = mesh_config.mesh_min.split(",")[0]|float %}
		{% set min_y = mesh_config.mesh_min.split(",")[1]|float %}
		{% set max_x = mesh_config.mesh_max.split(",")[0]|float %}
		{% set max_y = mesh_config.mesh_max.split(",")[1]|float %}

		# make sure mesh coordinates lie within the configured mesh area
		{% set mesh_x0 = [[x0, max_x]|min, min_x]|max %}
		{% set mesh_y0 = [[y0, max_y]|min, min_y]|max %}
		{% set mesh_x1 = [[x1, max_x]|min, min_x]|max %}
		{% set mesh_y1 = [[y1, max_y]|min, min_y]|max %}

		{% if mesh_x0 == min_x and mesh_y0 == min_y and mesh_x1 == max_x and mesh_y1 == max_y %}
			# coordinates are invalid, fall back to full bed mesh
			RATICAL_ECHO PREFIX="Adaptive Mesh" MSG="Print is using the full bed, falling back to full bed mesh."
			{% if printer.fastconfig.settings.beacon is defined %}
				{% if beacon_contact_bed_mesh %}
					BED_MESH_CALIBRATE PROBE_METHOD=contact USE_CONTACT_AREA=1 SAMPLES={beacon_contact_bed_mesh_samples} PROFILE="{default_profile}"
				{% else %}
					{% if beacon_scan_method_automatic %}
						BED_MESH_CALIBRATE METHOD=automatic PROFILE="{default_profile}"
					{% else %}
						BED_MESH_CALIBRATE PROFILE="{default_profile}"
					{% endif %}
					_BEACON_APPLY_SCAN_COMPENSATION_IF_ENABLED
				{% endif %}
			{% else %}
				BED_MESH_CALIBRATE PROFILE="{default_profile}"
			{% endif %}
		{% else %}
			{% if printer["gcode_macro Ratical"].z_probe|lower == 'stowable' %}
				DEPLOY_PROBE
			{% endif %}
			# get configured probe count
			{% set probe_count_x = mesh_config.probe_count.split(",")[0]|int %}
			{% if mesh_config.probe_count.split(",")|length == 2 %}
					{% set probe_count_y = mesh_config.probe_count.split(",")[1]|int %}
			{% else %}
					{% set probe_count_y = mesh_config.probe_count.split(",")[0]|int %}
			{% endif %}

			# calculate mesh point resolution
			{% set probe_x_step = (max_x - min_x) / probe_count_x %}
			{% set probe_y_step = (max_y - min_y) / probe_count_y %}

			# calculate xy probe count
			{% set mesh_count_x = ([(mesh_x1 - mesh_x0) / probe_x_step, 3]|max)|int %}
			{% set mesh_count_y = ([(mesh_y1 - mesh_y0) / probe_y_step, 3]|max)|int %}
			{% set min_mesh_count = [mesh_count_x, mesh_count_y]|min %}
			{% set max_mesh_count = [mesh_count_x, mesh_count_y]|max %}

			# check algorithms
			{% set algorithm = mesh_config.algorithm %}
			{% if algorithm|lower == 'lagrange' and max_mesh_count > 6 %}
				RATICAL_ECHO PREFIX="Adaptive Mesh" MSG="cannot exceed a probe_count of 6 when using lagrange interpolation. Falling back to bicubic interpolation."
				{% set algorithm = 'bicubic' %}
			{% endif %}
			{% if algorithm|lower == 'bicubic' and min_mesh_count < 4 %}
				{% if max_mesh_count > 6 %}
					RATICAL_ECHO PREFIX="Adaptive Mesh" MSG="invalid probe_count option when using bicubic interpolation. Combination of 3 points on one axis with more than 6 on another is not permitted. Forcing minimum mesh count to be 4."
					{% set min_mesh_count = 4 %}
				{% else %}
					RATICAL_ECHO PREFIX="Adaptive Mesh" MSG="bicubic interpolation with a probe_count of less than 4 points detected. Forcing lagrange interpolation."
					{% set algorithm = 'lagrange' %}
				{% endif %}
			{% endif %}

			{% set mesh_count_x = ([min_mesh_count, mesh_count_x]|max)|int %}
			{% set mesh_count_x = ([max_mesh_count, mesh_count_x]|min)|int %}
			{% set mesh_count_y = ([min_mesh_count, mesh_count_y]|max)|int %}
			{% set mesh_count_y = ([max_mesh_count, mesh_count_y]|min)|int %}

			{% set should_prime = printer["gcode_macro Ratical"].nozzle_priming == 'primeblob' %}
			{% if printer["dual_carriage"] is not defined %}
				# DEFAULT
				{% set probe_first = printer["gcode_macro Ratical"].nozzle_prime_start_y|lower == "min" or printer["gcode_macro Ratical"].nozzle_prime_start_y|float(printable_y_max) < printable_y_max / 2 %}
			{% else %}
				# IDEX
				{% set probe_first = printer["gcode_macro Ratical"].nozzle_prime_start_y|lower == "min" or printer["gcode_macro Ratical"].nozzle_prime_start_y|float(printable_y_max) < printable_y_max / 2 %}
			{% endif %}
			{% if printer.fastconfig.settings.beacon is defined and printer.fastconfig.settings.beacon.mesh_runs % 2 != 0 and probe_first %}
				{% set probe_first = false %}
			{% elif printer.fastconfig.settings.beacon is defined and printer.fastconfig.settings.beacon.mesh_runs % 2 == 0 and not probe_first %}
				{% set probe_first = true %}
			{% endif %}

			# probe for priming
			{% if should_prime and probe_first %}
				{% if printer["dual_carriage"] is not defined %}
					# DEFAULT
					PROBE_FOR_PRIMING
				{% else %}
					# IDEX
					{% if both_toolheads %}
						PROBE_FOR_PRIMING TOOLHEAD=0 IDEX_MODE={idex_mode}
						PROBE_FOR_PRIMING TOOLHEAD=1 IDEX_MODE={idex_mode}
					{% else %}
						PROBE_FOR_PRIMING TOOLHEAD={params.T|int} IDEX_MODE={idex_mode}
					{% endif %}
				{% endif %}
			{% endif %}

			# mesh
			RATICAL_ECHO PREFIX="Adaptive Mesh" MSG="mesh coordinates X0={mesh_x0|round(1)} Y0={mesh_y0|round(1)} X1={mesh_x1|round(1)} Y1={mesh_y1|round(1)}"
			{% if printer.fastconfig.settings.beacon is defined %}
				{% if beacon_contact_bed_mesh %}
					BED_MESH_CALIBRATE PROBE_METHOD=contact USE_CONTACT_AREA=1 SAMPLES={beacon_contact_bed_mesh_samples} PROFILE="{default_profile}" ALGORITHM={algorithm} MESH_MIN={mesh_x0},{mesh_y0} MESH_MAX={mesh_x1},{mesh_y1} PROBE_COUNT={mesh_count_x},{mesh_count_y} RELATIVE_REFERENCE_INDEX=-1
				{% else %}
					{% if beacon_scan_method_automatic %}
						BED_MESH_CALIBRATE METHOD=automatic PROFILE="{default_profile}" ALGORITHM={algorithm} MESH_MIN={mesh_x0},{mesh_y0} MESH_MAX={mesh_x1},{mesh_y1} PROBE_COUNT={mesh_count_x},{mesh_count_y}
					{% else %}
						BED_MESH_CALIBRATE PROFILE="{default_profile}" ALGORITHM={algorithm} MESH_MIN={mesh_x0},{mesh_y0} MESH_MAX={mesh_x1},{mesh_y1} PROBE_COUNT={mesh_count_x},{mesh_count_y}
					{% endif %}
				{% endif %}
				_BEACON_APPLY_SCAN_COMPENSATION_IF_ENABLED
			{% else %}
				BED_MESH_CALIBRATE PROFILE="{default_profile}" ALGORITHM={algorithm} MESH_MIN={mesh_x0},{mesh_y0} MESH_MAX={mesh_x1},{mesh_y1} PROBE_COUNT={mesh_count_x},{mesh_count_y}
			{% endif %}

			# probe for priming
			{% if should_prime and not probe_first %}
				{% if printer["dual_carriage"] is not defined %}
					# DEFAULT
					PROBE_FOR_PRIMING
				{% else %}
					# IDEX
					{% if both_toolheads %}
						PROBE_FOR_PRIMING TOOLHEAD=0 IDEX_MODE={idex_mode}
						PROBE_FOR_PRIMING TOOLHEAD=1 IDEX_MODE={idex_mode}
					{% else %}
						PROBE_FOR_PRIMING TOOLHEAD={params.T|int} IDEX_MODE={idex_mode}
					{% endif %}
				{% endif %}
			{% endif %}

			# stow probe
			{% if printer["gcode_macro Ratical"].z_probe|lower == 'stowable' %}
				STOW_PROBE
			{% endif %}

		{% endif %}
	{% endif %}

# Ratical commissioning wizard (phase 1, macro-driven).
# A guided, resumable checklist for first start. Run RATICAL_COMMISSION at any time
# to see, in order, which calibration steps are done and what to run next. Status is
# derived from the printer's actual state each call, so it is always current and there
# is no separate state to get out of sync.
#
# Steps that can be verified from printer state show [x] done / [ ] to-do, and the first
# unfinished one is flagged "<= NEXT". Steps that can't be auto-verified (PID, shaper,
# first print) show [-] and are listed as reminders.

[gcode_macro RATICAL_COMMISSION]
description: Guided first-start commissioning checklist. Shows each calibration step in order, auto-detecting what's done, and points to the next command to run.
gcode:
	{% set idex = printer["dual_carriage"] is defined %}
	{% set has_beacon = (printer.fastconfig.settings.beacon is defined) if (printer.fastconfig is defined) else (printer.beacon is defined) %}

	# --- auto-detected gate status ---
	{% set homed = 'xyz' in printer.toolhead.homed_axes %}
	{% set dc_ok = (printer["gcode_macro Ratical"].dc_endstop_is_configured|default(false)) if idex else true %}
	{% set vaoc_ok = (printer.save_variables is defined and printer.save_variables.variables.idex_xcontrolpoint is defined) if idex else true %}
	{% set beacon_model_ok = ('beacon model default' in printer.configfile.config) if has_beacon else true %}
	{% set mesh_ok = (printer.bed_mesh is defined and printer.bed_mesh.profiles|length > 0) %}

	# --- ordered step list: (label, done, command) ; done=none means "can't verify" ---
	{% set steps = [] %}
	{% set _ = steps.append(('Home all axes', homed, 'G28')) %}
	{% if idex %}
		{% set _ = steps.append(('Configure IDEX DC endstop, then RESTART klipper', dc_ok, 'CONFIGURE_DC_ENDSTOP')) %}
		{% set _ = steps.append(('Set IDEX toolhead offsets (VAOC page in the configurator)', vaoc_ok, 'open the VAOC page and align T0/T1')) %}
	{% endif %}
	{% if has_beacon %}
		{% set _ = steps.append(('Calibrate beacon Z model, then SAVE_CONFIG', beacon_model_ok, 'BEACON_INITIAL_CALIBRATION')) %}
	{% endif %}
	{% set _ = steps.append(('Calibrate bed mesh, then SAVE_CONFIG', mesh_ok, 'BED_MESH_CALIBRATE')) %}
	{% set _ = steps.append(('PID tune hotend and bed', none, 'PID_CALIBRATE_HOTEND then PID_CALIBRATE_BED')) %}
	{% set _ = steps.append(('Input shaper (enter values into variable_shaper_*)', none, 'GENERATE_SHAPER_GRAPHS')) %}
	{% set _ = steps.append(('First test print', none, 'slice and print a small model')) %}

	# --- render ---
	{% set ns = namespace(msg='Ratical commissioning checklist:', next_flagged=false, todo=0) %}
	{% for label, done, cmd in steps %}
		{% if done %}
			{% set mark = '[x]' %}
			{% set tag = '' %}
		{% elif done == false %}
			{% set mark = '[ ]' %}
			{% set ns.todo = ns.todo + 1 %}
			{% if not ns.next_flagged %}
				{% set tag = '   <= NEXT: ' ~ cmd %}
				{% set ns.next_flagged = true %}
			{% else %}
				{% set tag = '' %}
			{% endif %}
		{% else %}
			{% set mark = '[-]' %}
			{% set tag = '   (' ~ cmd ~ ')' %}
		{% endif %}
		{% set ns.msg = ns.msg ~ '\n' ~ mark ~ ' ' ~ label ~ tag %}
	{% endfor %}
	{% if ns.todo == 0 %}
		{% set ns.msg = ns.msg ~ '\n' ~ 'All auto-verifiable steps done. Finish the [-] reminders (PID / shaper / first print).' %}
	{% endif %}
	{% set ns.msg = ns.msg ~ '\n' ~ 'Legend: [x] done  [ ] to-do  [-] cannot auto-verify. Re-run RATICAL_COMMISSION any time.' %}
	{ action_respond_info(ns.msg) }

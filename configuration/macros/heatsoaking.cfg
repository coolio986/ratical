# WARNING: DO NOT EDIT THIS FILE
# To override settings from this file, you can copy and paste the relevant
# sections into your printer.cfg and change it there.

#####
# CONFIGURATION VARIABLES
#####

[gcode_macro Ratical]
variable_bed_heat_soak_time: 0		# Fixed heat soak time for the bed in seconds (0 = no soak)
									# NB: Does not apply when a beacon probe is present and beacon adaptive heatsoaking is enabled.
variable_hotend_heat_soak_time: 0	# Fixed heat soak time for the hotends in seconds (0 = no soak)
									# NB: Does not apply when a beacon probe is present and beacon adaptive heatsoaking is enabled.

#####
# MACROS
#####

[gcode_macro RESET_HEATSOAK_SETTINGS]
description: Resets all heatsoak-related settings to startup defaults
gcode:
	HEATSOAK_SETTINGS ACTION=reset

[gcode_macro USE_ADAPTIVE_HEATSOAK]
description: Temporarily enables adaptive bed heatsoaking (if a beacon probe is present), will reset to printer.cfg settings
	when Klipper is restarted. Optionally specify QUALITY (1-5) and maximum FIRST_LAYER_DURATION (in minutes).
	Startup settings will be used by default.
gcode:
	# params2 etc is to suit use as a Mainsail macro button
	{% set params2 = params %}
	{% if False %}
		{% set _ = params.QUALITY|default("1..5") %}
		{% set _ = params.FIRST_LAYER_DURATION|default("1..120 minutes") %}
	{% endif %}
	{% if printer.fastconfig.settings.beacon is not defined %}
		{ action_raise_error("Adaptive heatsoaking is only available when a beacon probe is configured.") }
	{% endif %}
	{% set settings = printer.fastconfig.settings["gcode_macro ratical"] %}
	{% if settings is not defined %}
		{ action_raise_error("No settings found for [gcode_macro Ratical]") }
	{% endif %}
	{% set defsrc = params2.DEFAULT|default(printer["gcode_macro HEATSOAK_SETTINGS"].default_source)|lower %}
	{% set current = printer["gcode_macro Ratical"] %}
	{% if not defsrc in ('startup', 'current') %}
		{ action_raise_error("DEFAULT must be either 'startup' or 'current'.") }
	{% endif %}
	{% set default_quality = (settings.variable_beacon_adaptive_heat_soak_layer_quality if defsrc == 'startup' else current.beacon_adaptive_heat_soak_layer_quality)|default(3)|int %}
	{% set default_first_layer_duration_secs = (settings.variable_beacon_adaptive_heat_soak_maximum_first_layer_duration if defsrc == 'startup' else current.beacon_adaptive_heat_soak_maximum_first_layer_duration)|default(1800)|int %}
	{% if params2.QUALITY is defined %}
		{% set quality = params2.QUALITY|int %}
		{% if quality < 1 or quality > 5 %}
			{ action_raise_error("QUALITY must be between 1 (rough) and 5 (maximum). Use 3 (normal) if unsure.") }
		{% endif %}
	{% else %}
		{% set quality = default_quality %}
	{% endif %}
	{% if params2.FIRST_LAYER_DURATION is defined %}
		{% set first_layer_duration_mins = params2.FIRST_LAYER_DURATION|float %}
		{% if first_layer_duration_mins <= 0 %}
			{ action_raise_error("FIRST_LAYER_DURATION must be a positive number specifying the maximum first layer duration in minutes.") }
		{% endif %}
		{% if first_layer_duration_mins > 120 %}
			CONSOLE_ECHO MSG="FIRST_LAYER_DURATION will be limited to 120 minutes. Values larger than this will not have an effect on soak time."
			{% set first_layer_duration_mins = 120 %}
		{% endif %}
		{% set first_layer_duration_secs = (first_layer_duration_mins * 60.0)|int %}
	{% else %}
		{% set first_layer_duration_secs = default_first_layer_duration_secs %}
		{% set first_layer_duration_mins = first_layer_duration_secs / 60.0 %}
	{% endif %}
	HEATSOAK_SETTINGS QUIET=1 beacon_adaptive_heat_soak=True beacon_adaptive_heat_soak_layer_quality={quality} beacon_adaptive_heat_soak_maximum_first_layer_duration={first_layer_duration_secs}
	RATICAL_ECHO MSG="Will use adaptive bed heatsoak with quality {quality} and maximum first layer duration of {first_layer_duration_mins|int if (first_layer_duration_mins|float).is_integer() else first_layer_duration_mins|round(2)} minutes."

[gcode_macro USE_FIXED_HEATSOAK]
description: Temporarily enables fixed bed heatsoaking, will reset to printer.cfg settings when Klipper is restarted.
	Optionally specify DURATION (in minutes). Startup settings will be used by default.
gcode:
	# params2 etc is to suit use as a Mainsail macro button
	{% set params2 = params %}
	{% if False %}
		{% set _ = params.DURATION|default("0..720 minutes") %}
	{% endif %}
	{% set settings = printer.fastconfig.settings["gcode_macro ratical"] %}
	{% if settings is not defined %}
		{ action_raise_error("No settings found for [gcode_macro Ratical]") }
	{% endif %}
	{% set defsrc = params2.DEFAULT|default(printer["gcode_macro HEATSOAK_SETTINGS"].default_source)|lower %}
	{% set current = printer["gcode_macro Ratical"] %}
	{% if not defsrc in ('startup', 'current') %}
		{ action_raise_error("DEFAULT must be either 'startup' or 'current'.") }
	{% endif %}
	{% set default_duration = (settings.variable_bed_heat_soak_time if defsrc == 'startup' else current.bed_heat_soak_time)|default(0)|int %}
	{% if params2.DURATION is defined %}
		{% set duration_mins = params2.DURATION|float %}
		{% if duration_mins < 0 %}
			{ action_raise_error("DURATION must be a non-negative number specifying the heatsoak duration in minutes.") }
		{% endif %}
		{% if duration_mins > 720 %}
			CONSOLE_ECHO MSG="DURATION will be limited to 720 minutes (12 hours). If you really need a larger value, adjust printer.cfg instead."
			{% set duration_mins = 720 %}
		{% endif %}
		{% set duration_secs = (duration_mins * 60.0)|int %}
	{% else %}
		{% set duration_secs = default_duration %}
		{% set duration_mins = duration_secs / 60.0 %}
	{% endif %}
	{% set has_beacon = printer.fastconfig.settings.beacon is defined %}
	{% if has_beacon %}
		HEATSOAK_SETTINGS QUIET=1 beacon_adaptive_heat_soak=False bed_heat_soak_time={duration_secs}
	{% else %}
		HEATSOAK_SETTINGS QUIET=1 bed_heat_soak_time={duration_secs}
	{% endif %}
	{% if duration_mins < 1e-3 %}
		RATICAL_ECHO MSG="Will use no bed heatsoak."
	{% else %}
		RATICAL_ECHO MSG="Will use fixed-duration bed heatsoak of {duration_mins|int if (duration_mins|float).is_integer() else duration_mins|round(2)} minutes."
	{% endif %}

[gcode_macro USE_NO_HEATSOAK]
description: Temporarily disables bed heatsoaking, will reset to printer.cfg settings when Klipper is restarted.
gcode:
	USE_FIXED_HEATSOAK DURATION=0

[gcode_macro HEATSOAK_SETTINGS]
description: Shows or adjusts heatsoak settings
	- With no arguments: shows current heatsoak settings, specify VERBOSE=1 for detailed output
	- With arguments: sets the specified settings. Use the full setting name without the variable_ prefix, e.g. bed_heat_soak_time=300 or beacon_adaptive_heat_soak_layer_quality=4. See printer.cfg for available settings.
variable_default_source: "startup"
			# "startup" or "current", determines where default values are taken from when using the USE_ADAPTIVE_HEATSOAK and 
			# USE_FIXED_HEATSOAK commands. This can be overridden per call using the DEFAULT parameter with those commands.
			# "startup" will use the original printer.cfg values from when Klipper was started, while "current"
			# will use the current values which may have been modified by previous commands.
gcode:
	# Avoid unwanted param detection by mainsail: uses of params2 won't be noticed.
	{% set params2 = params %}
	{% set has_beacon = printer.fastconfig.settings.beacon is defined %}
	{% set quiet = params2.pop("QUIET", None)|default("0") in ("1", "true", "yes") %}
	{% set verbose = params2.pop("VERBOSE", None)|default("0") in ("1", "true", "yes") %}
	{% if has_beacon %}
		{% set vars = (
			"beacon_adaptive_heat_soak",
			"beacon_adaptive_heat_soak_max_wait",
			"beacon_adaptive_heat_soak_extra_wait_after_completion",
			"beacon_adaptive_heat_soak_layer_quality",
			"beacon_adaptive_heat_soak_maximum_first_layer_duration",
			"bed_heat_soak_time",
			"hotend_heat_soak_time",
			) %}
	{% else %}
		{% set vars = (
			"bed_heat_soak_time",
			"hotend_heat_soak_time",
			) %}
	{% endif %}
	{% set action = "show" if params|length == 0 else params2.ACTION %}
	{% if action is defined and params|length > 1 %}
		{ action_raise_error("ACTION cannot be specified with other parameters.") }
	{% elif action is not defined %}
		{% for k, v in params2.items() %}
			{% set k = k|lower %}
			{% if k in vars %}
				{% if not quiet %}
					CONSOLE_ECHO MSG="Setting {k} to {v}"
				{% endif %}
				SET_GCODE_VARIABLE MACRO=Ratical VARIABLE={k} VALUE={v}
			{% else %}
				{ action_raise_error("Parameter '%s' is not recognised. Note that adaptive heatsoaking settings can only be set when a beacon probe is configured." % k) }
			{% endif %}
		{% endfor %}
	{% elif action == "reset" %}
		_RESET_GCODE_VARIABLES MACRO=Ratical VARIABLES={vars|join(',')} SKIP_UNDEFINED_VARIABLES=1
		CONSOLE_ECHO MSG="Heatsoak settings have been reset to their original values."
	{% elif action == "show" %}
		{% set current = printer["gcode_macro Ratical"] %}
		{% set is_adaptive = False if not has_beacon else current.beacon_adaptive_heat_soak|default("")|lower == "true" %}
		{% if is_adaptive %}
			{% set quality = current.beacon_adaptive_heat_soak_layer_quality|default(3)|int %}
			{% set first_layer_duration_secs = current.beacon_adaptive_heat_soak_maximum_first_layer_duration|default(1800)|int %}
			{% set first_layer_duration_mins = first_layer_duration_secs / 60.0 %}
			RATICAL_ECHO MSG="Will use adaptive bed heatsoak with quality {quality} and maximum first layer duration of {first_layer_duration_mins|int if (first_layer_duration_mins|float).is_integer() else first_layer_duration_mins|round(2)} minutes."
		{% elif current.bed_heat_soak_time|default(0)|int > 0 %}
			{% set duration_mins = (current.bed_heat_soak_time|int / 60.0) %}
			RATICAL_ECHO MSG="Will use fixed-duration bed heatsoak of {duration_mins|int if (duration_mins|float).is_integer() else duration_mins|round(2)} minutes."
		{% else %}
			RATICAL_ECHO MSG="Will use no bed heatsoak."
		{% endif %}
		{% if verbose %}
			CONSOLE_ECHO MSG="Detailed settings:"
			_SHOW_GCODE_VARIABLES MACRO=Ratical VARIABLES={vars|join(',')} SKIP_UNDEFINED_VARIABLES=1
		{% endif %}
	{% else %}
		{ action_raise_error("Action '%s' is not recognised" % action) }
	{% endif %}

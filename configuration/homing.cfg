# WARNING: DO NOT EDIT THIS FILE
# To override settings from this file, you can copy and paste the relevant
# sections into your printer.cfg and change it there.

#####
# CONFIGURATION VARIABLES
#####

[gcode_macro Ratical]
variable_homing: "endstops"                    # endstops|sensorless = axis homing method
variable_z_probe: "static"                     # static|stowable = z-probe type
variable_sensorless_x_current: 0.6             # float = stepper driver run current for sensorless x-homing
variable_sensorless_y_current: 0.9             # float = stepper driver run current for sensorless y-homing
variable_safe_home_x: "middle"                 # float|middle = z-homing x location
variable_safe_home_y: "middle"                 # float|middle = z-homing y location
variable_driver_type_x: "tmc2209"              # tmc2209|tmc2130|tmc5160 = stepper driver type for sensorless homing
variable_driver_type_y: "tmc2209"              # tmc2209|tmc2130|tmc5160 = stepper driver type for sensorless homing
variable_stowable_probe_stop_on_error: False   # internal use only. Do not touch!

[ratical_homing]
axes: xyz
z_hop: 15         # homing z-hop distance
z_hop_speed: 15   # homing z-hop speed
gcode:
	# visual feedback
	_LED_ON

	# config
	{% set prev_stop_on_error = printer["gcode_macro Ratical"].stowable_probe_stop_on_error %}

	# reset IDEX mode
	{% if printer["dual_carriage"] is defined %}
		{% set default_toolhead = printer["gcode_macro Ratical"].default_toolhead|default(0)|int %}
		{% set target_idex_mode = printer["dual_carriage"].carriage_1|lower %}
		_IDEX_SINGLE
		_SELECT_TOOL T={default_toolhead} TOOLSHIFT=false
	{% endif %}

	# Make stowable probe assertion failures cause an emergency stop
	SET_GCODE_VARIABLE MACRO=Ratical VARIABLE=stowable_probe_stop_on_error VALUE=True

	# Wait for moves to finish
	M400
	# Absolute positioning
	G90

	# home printer
	{% set X = true if params.X is defined else false %}
	{% set Y = true if params.Y is defined else false %}
	{% set Z = true if params.Z is defined else false %}
	{% if printer["gcode_macro Ratical"].home_y_first|default(false)|lower == 'true' %}
		HOME_Y X={X} Y={Y} Z={Z}
		HOME_X X={X} Y={Y} Z={Z}
	{% else %}
		HOME_X X={X} Y={Y} Z={Z}
		HOME_Y X={X} Y={Y} Z={Z}
	{% endif %}
	HOME_Z X={X} Y={Y} Z={Z}

	# Reset stowable probe stop on error state
	SET_GCODE_VARIABLE MACRO=Ratical VARIABLE=stowable_probe_stop_on_error VALUE={prev_stop_on_error}

	# restore IDEX mode
	{% if printer["dual_carriage"] is defined %}
		{% if target_idex_mode == "copy" %}
			_IDEX_COPY
		{% elif target_idex_mode == "mirror" %}
			_IDEX_MIRROR
		{% endif %}
	{% endif %}

[gcode_macro HOME_X]
gcode:
	# config
	{% set x_homed = 'x' in printer.toolhead.homed_axes %}
	{% set homing = printer["gcode_macro Ratical"].homing|lower %}
	{% set homing_x = printer["gcode_macro Ratical"].homing_x|lower %}
	{% set homing_x = homing_x if homing_x else homing %}
	{% set speed = printer["gcode_macro Ratical"].macro_travel_speed|float * 60 %}
	{% set printable_x_max = printer["gcode_macro Ratical"].printable_x_max|float %}
	{% set safe_home_x, safe_home_y = printer.ratical.safe_home_position %}

	# parameter
	{% set X = true if params.X|lower == 'true' else false %}
	{% set Y = true if params.Y|lower == 'true' else false %}
	{% set Z = true if params.Z|lower == 'true' else false %}

	DEBUG_ECHO PREFIX="HOME_X" MSG="printable_x_max: {printable_x_max}, safe_home_x: {safe_home_x}, axis_maximum.x: {printer.toolhead.axis_maximum.x}, bed_margin_x: {printer['gcode_macro Ratical'].bed_margin_x}"

	# home x
	{% if X or not Y and not Z %}
		{% if homing_x == 'endstop' %}
			G28 X
		{% elif homing_x == 'sensorless' %}
			{% if printer["dual_carriage"] is defined %}
				{ action_emergency_stop("sensorless homing not supported on IDEX!") }
			{% endif %}
			HOME_X_SENSORLESS
		{% else %}
			{ action_emergency_stop("expected Ratical variable_homing_x to be 'sensorless' 'endstop' or variable_homing to be 'sensorless' or 'endstops' but found {} and {}".format(homing_x, homing)) }
		{% endif %}
		{% if printer["dual_carriage"] is defined %}
			# park secondary toolhead in its parking position instead of the endstop position
			{% set default_toolhead = printer["gcode_macro Ratical"].default_toolhead|default(0)|int %}
			{% set parking_position = printer["gcode_macro T%s" % (0 if default_toolhead==1 else 1)].parking_position|float %}
			SET_DUAL_CARRIAGE CARRIAGE={0 if default_toolhead==1 else 1} MODE=PRIMARY
			G1 X{parking_position} F{speed}
			SET_DUAL_CARRIAGE CARRIAGE={default_toolhead} MODE=PRIMARY
		{% endif %}
		{% set x_homed = True %}
		G0 X{safe_home_x} F{speed}
		M400 # Wait for moves to finish
	{% endif %}

[gcode_macro HOME_Y]
gcode:
	# config
	{% set y_homed = 'y' in printer.toolhead.homed_axes %}
	{% set homing = printer["gcode_macro Ratical"].homing|lower %}
	{% set homing_y = printer["gcode_macro Ratical"].homing_y|lower %}
	{% set homing_y = homing_y if homing_y else homing %}
	{% set speed = printer["gcode_macro Ratical"].macro_travel_speed|float * 60 %}
	{% set printable_y_max = printer["gcode_macro Ratical"].printable_y_max|float %}
	{% set safe_home_x, safe_home_y = printer.ratical.safe_home_position %}

	# parameter
	{% set X = true if params.X|lower == 'true' else false %}
	{% set Y = true if params.Y|lower == 'true' else false %}
	{% set Z = true if params.Z|lower == 'true' else false %}

	DEBUG_ECHO PREFIX="HOME_Y" MSG="printable_y_max: {printable_y_max}, safe_home_y: {safe_home_y}, axis_maximum.y: {printer.toolhead.axis_maximum.y}, bed_margin_y: {printer['gcode_macro Ratical'].bed_margin_y}"

	# home y
	{% if Y or not X and not Z %}
		{% if homing_y == 'endstop' %}
			G28 Y
		{% elif homing_y == 'sensorless' %}
			HOME_Y_SENSORLESS
		{% else %}
			{ action_emergency_stop("expected Ratical variable_homing_y to be 'sensorless' 'endstop' or variable_homing to be 'sensorless' or 'endstops' but found {} and {}".format(homing_y, homing)) }
		{% endif %}
		{% set y_homed = True %}
		G0 Y{safe_home_y} F{speed}
	{% endif %}

[gcode_macro HOME_Z]
gcode:
	# config
	{% set x_homed = 'x' in printer.toolhead.homed_axes %}
	{% set y_homed = 'y' in printer.toolhead.homed_axes %}
	{% set z_probe = printer["gcode_macro Ratical"].z_probe %}

	# beacon contact config
	{% set beacon_contact_z_homing = true if printer["gcode_macro Ratical"].beacon_contact_z_homing|default(false)|lower == 'true' else false %}
	{% set beacon_contact_start_print_true_zero = true if printer["gcode_macro Ratical"].beacon_contact_start_print_true_zero|default(false)|lower == 'true' else false %}
	{% set beacon_z_home_position_fuzzing_radius = printer["gcode_macro Ratical"].beacon_z_home_position_fuzzing_radius|default(0)|float %}

	# parameter
	{% set X = true if params.X|lower == 'true' else false %}
	{% set Y = true if params.Y|lower == 'true' else false %}
	{% set Z = true if params.Z|lower == 'true' else false %}

	DEBUG_ECHO PREFIX="HOME_Z" MSG="x_homed: {x_homed}, y_homed: {y_homed}, z_probe: {z_probe}, beacon_contact_z_homing: {beacon_contact_z_homing}"

	# home z
	{% if Z or not Y and not X %}
		RATICAL_ECHO MSG="Homing Z"
		{% if x_homed == False or y_homed == False %}
			{ action_emergency_stop("X and Y must be homed before homing Z") }
		{% else %}
			{% if z_probe == "stowable" %}
				DEPLOY_PROBE
			{% endif %}
			_MOVE_TO_SAFE_Z_HOME
			{% if printer.fastconfig.settings.beacon is defined and beacon_contact_z_homing %}				
				{% if beacon_contact_start_print_true_zero %}
					# The critical zero probing happens during start print after heat soaking, not here.
					BEACON_AUTO_CALIBRATE SKIP_MODEL_CREATION=1 SKIP_MULTIPOINT_PROBING=1
				{% else %}
					# The critical zero probing happens here.
					BEACON_AUTO_CALIBRATE SKIP_MODEL_CREATION=1
				{% endif %}
				_MOVE_TO_SAFE_Z_HOME Z_HOP=True
			{% else %}
				G28 Z
			{% endif %}
			_Z_HOP
			{% if z_probe == "stowable" %}
				STOW_PROBE
			{% endif %}
		{% endif %}
	{% endif %}

[gcode_macro HOME_X_SENSORLESS]
gcode:
	# Handle toolhead settings
	CACHE_TOOLHEAD_SETTINGS KEY="home_x_sensorless"

	# config
	{% set printable_x_max = printer["gcode_macro Ratical"].printable_x_max|float %}

	# Set homing acceleration (important!)
	M204 S1000

	# set tmc stepper current
	{% if printer["gcode_macro Ratical"].x_axes is defined %}
		{% for axis in printer["gcode_macro Ratical"].x_axes %}
			{% set stepper = "stepper_" ~ axis|lower %}
			SET_TMC_CURRENT STEPPER={stepper} CURRENT={printer["gcode_macro Ratical"].sensorless_x_current}
		{% endfor %}
	{% else %}
		{% set x_driver = printer["gcode_macro Ratical"].driver_type_x|lower ~ " stepper_x" %}
		SET_TMC_CURRENT STEPPER=stepper_x CURRENT={printer["gcode_macro Ratical"].sensorless_x_current}
	{% endif %}

	{% if printer["gcode_macro Ratical"].y_axes is defined %}
		{% for axis in printer["gcode_macro Ratical"].y_axes %}
			{% set stepper = "stepper_" ~ axis|lower %}
			SET_TMC_CURRENT STEPPER={stepper} CURRENT={printer["gcode_macro Ratical"].sensorless_x_current}
		{% endfor %}
	{% else %}
		{% set y_driver = printer["gcode_macro Ratical"].driver_type_y|lower ~ " stepper_y" %}
		SET_TMC_CURRENT STEPPER=stepper_y CURRENT={printer["gcode_macro Ratical"].sensorless_x_current}
	{% endif %}

	# Wait for currents to settle
	G4 P300
	# Home X
	G28 X

	# restore tmc stepper current
	{% if printer["gcode_macro Ratical"].x_axes is defined %}
		{% for axis in printer["gcode_macro Ratical"].x_axes %}
			{% set stepper = "stepper_" ~ axis|lower %}
			{% set stepper_driver = printer["gcode_macro Ratical"].x_driver_types[loop.index0] ~ " " ~ stepper %}
			SET_TMC_CURRENT STEPPER={stepper} CURRENT={printer.fastconfig.config[stepper_driver].run_current}
		{% endfor %}
	{% else %}
		{% set x_driver = printer["gcode_macro Ratical"].driver_type_x|lower ~ " stepper_x" %}
		SET_TMC_CURRENT STEPPER=stepper_x CURRENT={printer.fastconfig.config[x_driver].run_current}
	{% endif %}

	{% if printer["gcode_macro Ratical"].y_axes is defined %}
		{% for axis in printer["gcode_macro Ratical"].y_axes %}
			{% set stepper = "stepper_" ~ axis|lower %}
			{% set stepper_driver = printer["gcode_macro Ratical"].y_driver_types[loop.index0] ~ " " ~ stepper %}
			SET_TMC_CURRENT STEPPER={stepper} CURRENT={printer.fastconfig.config[stepper_driver].run_current}
		{% endfor %}
	{% else %}
		{% set y_driver = printer["gcode_macro Ratical"].driver_type_y|lower ~ " stepper_y" %}
		SET_TMC_CURRENT STEPPER=stepper_y CURRENT={printer.fastconfig.config[y_driver].run_current}
	{% endif %}

	# Wait for currents to settle
	G4 P300

	# Handle toolhead settings
	RESTORE_TOOLHEAD_SETTINGS KEY="home_x_sensorless"

[gcode_macro HOME_Y_SENSORLESS]
gcode:
	# Handle toolhead settings
	CACHE_TOOLHEAD_SETTINGS KEY="home_y_sensorless"

	# config
	{% set printable_y_max = printer["gcode_macro Ratical"].printable_y_max|float %}

	# Set homing acceleration (important!)
	M204 S1000

	# set tmc stepper current
	{% if printer["gcode_macro Ratical"].x_axes is defined %}
		{% for axis in printer["gcode_macro Ratical"].x_axes %}
			{% set stepper = "stepper_" ~ axis|lower %}
			SET_TMC_CURRENT STEPPER={stepper} CURRENT={printer["gcode_macro Ratical"].sensorless_y_current}
		{% endfor %}
	{% else %}
		{% set x_driver = printer["gcode_macro Ratical"].driver_type_x|lower ~ " stepper_x" %}
		SET_TMC_CURRENT STEPPER=stepper_x CURRENT={printer["gcode_macro Ratical"].sensorless_y_current}
	{% endif %}

	{% if printer["gcode_macro Ratical"].y_axes is defined %}
		{% for axis in printer["gcode_macro Ratical"].y_axes %}
			{% set stepper = "stepper_" ~ axis|lower %}
			SET_TMC_CURRENT STEPPER={stepper} CURRENT={printer["gcode_macro Ratical"].sensorless_y_current}
		{% endfor %}
	{% else %}
		{% set y_driver = printer["gcode_macro Ratical"].driver_type_y|lower ~ " stepper_y" %}
		SET_TMC_CURRENT STEPPER=stepper_y CURRENT={printer["gcode_macro Ratical"].sensorless_y_current}
	{% endif %}

	# Wait for currents to settle
	G4 P300
	# Home Y
	G28 Y

	# restore tmc stepper current
	{% if printer["gcode_macro Ratical"].x_axes is defined %}
		{% for axis in printer["gcode_macro Ratical"].x_axes %}
			{% set stepper = "stepper_" ~ axis|lower %}
			{% set stepper_driver = printer["gcode_macro Ratical"].x_driver_types[loop.index0] ~ " " ~ stepper %}
			SET_TMC_CURRENT STEPPER={stepper} CURRENT={printer.fastconfig.config[stepper_driver].run_current}
		{% endfor %}
	{% else %}
		{% set x_driver = printer["gcode_macro Ratical"].driver_type_x|lower ~ " stepper_x" %}
		SET_TMC_CURRENT STEPPER=stepper_x CURRENT={printer.fastconfig.config[x_driver].run_current}
	{% endif %}

	{% if printer["gcode_macro Ratical"].y_axes is defined %}
		{% for axis in printer["gcode_macro Ratical"].y_axes %}
			{% set stepper = "stepper_" ~ axis|lower %}
			{% set stepper_driver = printer["gcode_macro Ratical"].y_driver_types[loop.index0] ~ " " ~ stepper %}
			SET_TMC_CURRENT STEPPER={stepper} CURRENT={printer.fastconfig.config[stepper_driver].run_current}
		{% endfor %}
	{% else %}
		{% set y_driver = printer["gcode_macro Ratical"].driver_type_y|lower ~ " stepper_y" %}
		SET_TMC_CURRENT STEPPER=stepper_y CURRENT={printer.fastconfig.config[y_driver].run_current}
	{% endif %}

	# Wait for currents to settle
	G4 P300

	# Handle toolhead settings
	RESTORE_TOOLHEAD_SETTINGS KEY="home_y_sensorless"

[gcode_macro _Z_HOP]
description: Move Z axis up by Z_HOP distance at Z_HOP_SPEED. In relative mode it will move Z axis up by Z_HOP distance. In absolute mode it will move Z axis to Z_HOP distance.
gcode:
	{% set z_hop = printer.fastconfig.config.ratical_homing.z_hop|float %}
	{% set z_hop_speed = printer.fastconfig.config.ratical_homing.z_hop_speed|float * 60 %}

	G0 Z{z_hop} F{z_hop_speed}

[gcode_macro __MOVE_TO_SAFE_Z_HOME_ECHO_DEBUG]
gcode:
	DEBUG_ECHO PREFIX="_MOVE_TO_SAFE_Z_HOME" MSG="x: {params.X}, y: {params.Y}, z_hop: {params.Z_HOP}, fuzzy_radius: {params.FUZZY_RADIUS}, axis_maximum.x: {printer.toolhead.axis_maximum.x}, axis_maximum.y: {printer.toolhead.axis_maximum.y}, bed_margin_x: {printer['gcode_macro Ratical'].bed_margin_x}, bed_margin_y: {printer['gcode_macro Ratical'].bed_margin_y}, printable_x_max: {printer['gcode_macro Ratical'].printable_x_max}, printable_y_max: {printer['gcode_macro Ratical'].printable_y_max}"

[gcode_macro MAYBE_HOME]
description: Only home unhomed axis. Specify ABL=1 to also ensure that automatic bed levelling is applied (if configured).
variable_is_kinematic_position_overriden: False
gcode:
	{% set abl = params.ABL|default('')|lower in ('true', 'yes', '1') %}
	{% if printer["gcode_macro MAYBE_HOME"].is_kinematic_position_overriden|lower == 'true' %}
		RATICAL_ECHO MSG="SET_CENTER_KINEMATIC_POSITION has been abused. Homing all axes. Please refrain from using SET_CENTER_KINEMATIC_POSITION outside of debugging purposes."
		G28
		SET_GCODE_VARIABLE MACRO=MAYBE_HOME VARIABLE=is_kinematic_position_overriden VALUE=False
	{% else %}
		{% set axes = '' %}
		{% set isHomed = true %}
		{% set axesToHome = '' %}
		{% if params.X is defined %}
			{% set axes = axes ~ 'X ' %}
			{% if 'x' not in printer.toolhead.homed_axes %}
				{% set isHomed = false %}
				{% set axesToHome = axesToHome ~ 'X ' %}
			{% endif %}
		{% endif %}
		{% if params.Y is defined %}
			{% set axes = axes ~ 'Y ' %}
			{% if 'y' not in printer.toolhead.homed_axes %}
				{% set isHomed = false %}
				{% set axesToHome = axesToHome ~ 'Y ' %}
			{% endif %}
		{% endif %}
		{% if params.Z is defined %}
			{% set axes = axes ~ 'Z ' %}
			{% if 'z' not in printer.toolhead.homed_axes %}
				{% set isHomed = false %}
				{% set axesToHome = axesToHome ~ 'Z ' %}
			{% endif %}
		{% endif %}
		{% if params.X is not defined and params.Y is not defined and params.Z is not defined %}
			{% set axes = '' %}
			{% if 'x' not in printer.toolhead.homed_axes %}
				{% set isHomed = false %}
				{% set axesToHome = axesToHome ~ 'X ' %}
			{% endif %}
			{% if 'y' not in printer.toolhead.homed_axes %}
				{% set isHomed = false %}
				{% set axesToHome = axesToHome ~ 'Y ' %}
			{% endif %}
			{% if 'z' not in printer.toolhead.homed_axes %}
				{% set isHomed = false %}
				{% set axesToHome = axesToHome ~ 'Z ' %}
			{% endif %}
		{% endif %}
		{% if isHomed is false %}
			RATICAL_ECHO MSG="Homing {axesToHome}"
			G28 {axesToHome}
		{% else %}
			RATICAL_ECHO MSG="All requested axes already homed. Skipping homing."
		{% endif %}
	{% endif %}
	{% if abl %}	
		{% if printer.z_tilt is defined %}
			{% if not printer.z_tilt.applied %}
				RATICAL_ECHO MSG="Performing Z tilt adjustment..."
				Z_TILT_ADJUST
				RATICAL_ECHO MSG="Rehoming Z after Z tilt adjustment..."
				G28 Z
			{% else %}
				RATICAL_ECHO MSG="Z tilt already applied. Skipping Z tilt adjustment."
			{% endif %}
		{% elif printer.quad_gantry_level is defined %}
			{% if not printer.quad_gantry_level.applied %}
				RATICAL_ECHO MSG="Performing quad gantry leveling..."
				QUAD_GANTRY_LEVEL 
				RATICAL_ECHO MSG="Rehoming Z after quad gantry leveling..."
				G28 Z
			{% else %}
				RATICAL_ECHO MSG="Quad gantry leveling already applied. Skipping quad gantry leveling."
			{% endif %}	
		{% else %}
			RATICAL_ECHO MSG="No automatic bed leveling method configured. Skipping bed leveling."
		{% endif %}
	{% endif %}	

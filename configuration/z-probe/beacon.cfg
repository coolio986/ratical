# WARNING. DO NOT EDIT THIS FILE.
# To override settings from this file, you can copy and paste the relevant
# sections into your printer.cfg and change it there.

# Configurator Metadata
# {
#   "type": "static-probe",
#   "title": "Beacon"
# }

#####
# BEACON HARDWARE CONFIGURATION
#####
[beacon]
serial: /dev/beacon
x_offset: 0 
y_offset: 22.5 
mesh_main_direction: x
# Using more than one mesh run is not currently reccomended because the Beacon extension determines the
# value to use from the combined run samples using median. If there is some drift between runs, median
# median instability can lead to an irregular spiky-looking mesh.
mesh_runs: 1
# When mesh_cluster_size is zero, all samples are clustered to their nearest mesh point. This approach
# avoids the aliasing seen when using small cluster sizes, which leads to the sample stream being effectively
# downsampled using unfiltered decimation.
mesh_cluster_size: 0
speed: 15.
lift_speed: 80.
contact_max_hotend_temperature: 275

#####
# RATICAL EXTENSION MODULES FOR EHNANCED BEACON FUNCTIONALITY
#####
[beacon_user_z_offset]
[beacon_mesh]
[beacon_true_zero_correction]
[beacon_adaptive_heat_soak]

[bed_mesh]
mesh_min: 20,30 # TODO: remove when automatically calculated by configurator

#####
# BEACON CONFIGURATION
#####

# IMPORTANT NOTE
#
# Regarding True Zero and model calibration:
#
# The recommended workflow is to enable variable_beacon_contact_start_print_true_zero and 
# variable_beacon_contact_calibrate_model_on_true_zero. This will ensure that a new beacon model is calibrated
# at the start of each print, adapting to different build sheets and temperatures as automatically.
# The alternative approach typically requires multiple beacon models to be maintained for different build sheets
# and temperatures, but Ratical does not have any features to help manage multiple beacon models at this time.
#
# Refer to https://docs.beacon3d.com/models/ for beacon's built-in model management features.

[gcode_macro Ratical]
variable_beacon_bed_mesh_scv: 25                        # square corner velocity for bed meshing with proximity method
variable_beacon_contact_z_homing: False                 # Make all G28 calls use contact instead of proximity scan. This is not recommended
														# on textured surfaces due to potential significant variation in contact measurements.
variable_beacon_contact_start_print_true_zero: True     # Use contact to determine true Z=0 for the last homing move during START_PRINT.
														# This is the recommended workflow. See note above.
variable_beacon_contact_start_print_true_zero_fuzzy_position: True
														# Use a fuzzy (randomized) position for the true zero contact measurement so that
														# the nozzle does not always contact the same point on the bed. This can help to
														# avoid creating a wear mark on the bed surface from always using the same point.
variable_beacon_contact_calibrate_model_on_true_zero: True
														# Calibrate a new beacon model when performing True Zero. This is the recommended workflow.
														# See note above.
variable_beacon_contact_wipe_before_true_zero: True     # enables a nozzle wipe at Y10 before true zeroing
variable_beacon_contact_wipe_before_true_zero_method: "probe_clean"
														# The method to use for nozzle wiping before true zeroing. Options are:
														# "probe_clean" - use BEACON_PROBE_CLEAN to displace filament from the nozzle tip
														# "wipe" - use the classic wipe method. In testing this method was found to be inneffective
														#          and is not recommended.
variable_beacon_contact_true_zero_temp: 170             # nozzle temperature for true zeroing. 170 is recommended as a reasonable default when using
														# the "probe_clean" wipe method, as this temperature softens most filaments enough to
														# allow effective cleaning without being so hot as to risk excessive oozing or bed damage.
                                                        # WARNING: if you're using a smooth PEI sheet, be careful with the temperature
variable_beacon_contact_prime_probing: True             # probe for priming with contact method
variable_beacon_contact_expansion_compensation: True    # enables hotend thermal expansion compensation

variable_beacon_contact_bed_mesh: False                 # Bed mesh with contact method. This is not recommended on textured surfaces due
														# to potential significant variation in contact measurements.
variable_beacon_contact_bed_mesh_samples: 2             # probe samples for contact bed mesh

variable_beacon_contact_z_tilt_adjust: False            # z-tilt adjust with contact method. This is not recommended on textured surfaces
														# due to potential significant variation in contact measurements.
variable_beacon_contact_z_tilt_adjust_samples: 2        # probe samples for contact z-tilt adjust

variable_beacon_scan_compensation_enable: True          # Enables beacon scan compensation
variable_beacon_scan_compensation_profile: "auto"     
														# The bed mesh profile name identifying the scan compensation mesh to use, or
														# "auto" to automatically select the most appropriate profile based on bed temperature.
variable_beacon_scan_compensation_desired_spacing: 10   # The desired spacing between probe points in mm for compensation mesh creation.
														# It is strongly recommended to leave this at the default value of 10mm. The compensation
														# mesh creation algorithm is designed and tested around this value, and using a significantly
														# different value may lead to suboptimal results. The actual spacing used depends on various
														# factors including the probe-able region and beacon mounting offset.
variable_beacon_scan_compensation_bed_temp_mismatch_is_error: False
														# If True, attempting to use a compensation mesh calibrated for a significantly
														# different bed temperature will raise an error. Otherwise, a warning is reported.

variable_beacon_contact_poke_bottom_limit: -1		    # The bottom limit for the contact poke test
variable_beacon_scan_method_automatic: False            # Enables the METHOD=automatic scan option. This is generally not recommended, and
														# specifically not recommended when beacon_scan_compensation_enable is enabled.

variable_beacon_adaptive_heat_soak: False				# Enables adaptive heat soaking based on beacon proximity measurements
														# This is enabled only for V-Core 4 variants by default, but can be disabled if desired.
														# Other printers can opt-in if desired, but proceed with caution as aspects of the adaptive
														# heat soak algorithm are currently tuned for the V-Core 4 design.
variable_beacon_adaptive_heat_soak_max_wait: 5400		# The maximum time in seconds to wait for adaptive heat soaking to complete. This is
														# a sanity limit to prevent the printer from waiting indefinitely for adaptive heat soaking.
variable_beacon_adaptive_heat_soak_extra_wait_after_completion: 0
														# The extra time in seconds to wait after adaptive heat soaking is considered complete.
														# Typically not needed, but can be useful for printers with very stable gantry designs
														# (such as steel rail on steel tube) where the adapative heat soak completes before
														# the edges of the bed have thermally stabilized.

variable_beacon_adaptive_heat_soak_layer_quality: 3		# Shorter soak times leave more thermal z deflection to occur during the print, leading to
														# imperfect early layers, notably with some oversquish developing over the first layer. Longer soak
														# times leave less thermal z deflection to occur during the print, leading to cleaner early
														# layers and more consistent z dimensional accuracy. The choice for this trade-off is
														# expressed by the layer quality setting.
														#
														# The quality scale is from 1 to 5, with 1 giving the fastest soak time but lowest early layer
														# quality, and 5 giving the slowest soak time but the highest early layer quality.
														#
														# 1 = rough, 2 = draft, 3 = normal, 4 = high, 5 = maximum

variable_beacon_adaptive_heat_soak_maximum_first_layer_duration: 1800
														# This must be set to the maximum first layer print time for the gcode files you will print.
														# For example, if you typically print first layers that take up to 30 minutes, set this to 1800
														# seconds. Longer durations will result in longer adaptive heat soak times. Be sure to set
														# this to a correct value. If you print a significantly longer first layer than this value,
														# excessive thermal z deflection may occur during the print, leading to very poor first layer
														# quality, print failure, or even damage to the bed.														
														# The value must be between 60 and 7200 seconds.

#####
# INTERNAL USE ONLY! DO NOT TOUCH!
#####
variable_beacon_contact_start_print_true_zero_fuzzy_radius: 20

#####
# BEACON COMMON
#####
[delayed_gcode _BEACON_INIT]
initial_duration: 1
gcode:
	ENSURE_CRITICAL_RATICAL_INIT
	# Initialize mesh management
	_BEACON_MESH_INIT

	# Handle deprecated variables
	_INIT_HANDLE_DEPRECATED_SAVE_VARIABLES_VARIABLE VARIABLE=nozzle_expansion_coefficient_multiplier
	_INIT_HANDLE_DEPRECATED_SAVE_VARIABLES_VARIABLE VARIABLE=nozzle_expansion_applied_offset
	_INIT_HANDLE_DEPRECATED_SAVE_VARIABLES_VARIABLE VARIABLE=beacon_saved_runtime_offset
	{% if printer["gcode_macro Ratical"].beacon_contact_expansion_multiplier is defined %}
		CONSOLE_ECHO TITLE="Deprecated gcode variable" TYPE="warning" MSG="The variable beacon_contact_expansion_multiplier is no longer used, please remove it from your config file."
	{% endif %}
	{% if printer["gcode_macro Ratical"].beacon_scan_compensation_resolution is defined %}
		CONSOLE_ECHO TITLE="Deprecated gcode variable" TYPE="warning" MSG="The variable beacon_scan_compensation_resolution is no longer used, please remove it from your config file."
	{% endif %}

#####
# BEACON CALIBRATION
#####
[gcode_macro BEACON_RATICAL_CALIBRATION]
gcode:
	RATICAL_ECHO MSG="Did you mean BEACON_RATICAL_CALIBRATE?"

#####
# BEACON CALIBRATION
#####
[gcode_macro BEACON_RATICAL_CALIBRATE]
gcode:
	# parameters
	{% set bed_temp = params.BED_TEMP|default(85)|int %}
	{% set chamber_temp = params.CHAMBER_TEMP|default(0)|int %}

	# config
	{% set default_toolhead = printer["gcode_macro Ratical"].default_toolhead|default(0)|int %}
	{% set beacon_contact_start_print_true_zero = true if printer["gcode_macro Ratical"].beacon_contact_start_print_true_zero|default(false)|lower == 'true' else false %}
	{% set beacon_scan_compensation_enable = true if printer["gcode_macro Ratical"].beacon_scan_compensation_enable|default(false)|lower == 'true' else false %}

	# activate IDEX default
	{% if printer["dual_carriage"] is defined %}
		_IDEX_SINGLE INIT=1
	{% endif %}
	
	# calibration
	BEACON_INITIAL_CALIBRATION _AUTOMATED=True

	{% if beacon_contact_start_print_true_zero %}
		BEACON_POKE_TEST _AUTOMATED=True
		_BEACON_CHECK_POKE
		{% if printer["dual_carriage"] is not defined %}
			BEACON_CALIBRATE_NOZZLE_TEMP_OFFSET _AUTOMATED=True
		{% endif %}
	{% endif %}

	{% set already_heated = False %}

	# scan calibration
	{% if beacon_contact_start_print_true_zero and beacon_scan_compensation_enable %}
		BEACON_CREATE_SCAN_COMPENSATION_MESH _AUTOMATED=True BED_TEMP={bed_temp} CHAMBER_TEMP={chamber_temp}
		{% set already_heated = True %}
	{% endif %}

	# final calibration 
	BEACON_FINAL_CALIBRATION _AUTOMATED=True _AUTOMATED_ALREADY_HEATED={already_heated} BED_TEMP={bed_temp} CHAMBER_TEMP={chamber_temp}

	# turn bed and extruder heaters off 
	SET_HEATER_TEMPERATURE HEATER={'extruder' if default_toolhead == 0 else 'extruder1'} TARGET=0
	SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=0

	# turn off chamber heater  
	{% if chamber_temp > 0 %}
		_CHAMBER_HEATER_OFF
	{% endif %}

	# echo
	{% if beacon_contact_start_print_true_zero %}
		{% if printer["dual_carriage"] is not defined %}
			_BEACON_ECHO_NOZZLE_TEMP_OFFSETS
		{% endif %}
		_BEACON_ECHO_POKE
	{% endif %}
	RATICAL_ECHO MSG="Beacon calibration finished!"

	# visual feedback
	_LED_BEACON_CALIBRATION_END

	# save config
	RATICAL_ECHO MSG="Saving config and restarting klipper..."
	SAVE_CONFIG

[gcode_macro BEACON_INITIAL_CALIBRATION]
gcode:
	# parameters
	{% set automated = true if params._AUTOMATED|default(false)|lower == 'true' else false %}

	# home x and y axis if not homed already
	MAYBE_HOME X=True Y=True

	# visual feedback
	_LED_BEACON_CALIBRATION_START

	# Absolute positioning
	G90

	# Go to safe home
	_MOVE_TO_SAFE_Z_HOME

	# auto calibrate beacon 
	BEACON_AUTO_CALIBRATE SKIP_MULTIPOINT_PROBING=1

	# raise toolhead to safe z-height
	_Z_HOP

	# echo
	RATICAL_ECHO MSG="Initial beacon contact calibration finished!"
	{% if not automated %}
		_CONSOLE_SAVE_CONFIG
	{% endif %}

	# visual feedback
	{% if not automated %}
		_LED_BEACON_CALIBRATION_END
	{% endif %}


[gcode_macro BEACON_FINAL_CALIBRATION]
description: Runs BEACON_AUTO_CALIBRATE after heating the bed and chamber to specified temperatures. This creates a beacon model under reference conditions for future use.
	This macro will skip calibration if both the beacon_contact_start_print_true_zero and beacon_contact_calibrate_model_on_true_zero settings are enabled, because a new 
	model will be calibrated automatically at the start of each print. Use FORCE=True to override this check.
gcode:
	# parameters
	{% set bed_temp = params.BED_TEMP|default(85)|int %}
	{% set chamber_temp = params.CHAMBER_TEMP|default(0)|int %}
	{% set automated = true if params._AUTOMATED|default(false)|lower == 'true' else false %}
	{% set already_heated = true if params._AUTOMATED_ALREADY_HEATED|default(false)|lower == 'true' else false %}
	{% set force = params.FORCE|default('false')|lower in ('1', 'true', 'yes') %}

	# precondition
	{% set beacon_contact_start_print_true_zero = printer["gcode_macro Ratical"].beacon_contact_start_print_true_zero|default(false)|lower == 'true' %}
	{% set beacon_contact_calibrate_model_on_true_zero = printer["gcode_macro Ratical"].beacon_contact_calibrate_model_on_true_zero|default('false')|lower == "true" %}

	{% if beacon_contact_start_print_true_zero and beacon_contact_calibrate_model_on_true_zero and not force %}
		RATICAL_ECHO MSG="BEACON_FINAL_CALIBRATION skipped, not needed because beacon_contact_calibrate_model_on_true_zero is enabled. Use FORCE=True to override."
	{% else %}
		# config
		{% set default_toolhead = printer["gcode_macro Ratical"].default_toolhead|default(0)|int %}
		{% set bed_heat_soak_time = printer["gcode_macro Ratical"].bed_heat_soak_time|default(0)|int %}
		{% set z_hop_speed = printer.fastconfig.config.ratical_homing.z_hop_speed|float * 60 %}

		# beacon adaptive heat soak config
		{% set beacon_adaptive_heat_soak = true if printer["gcode_macro Ratical"].beacon_adaptive_heat_soak|default(false)|lower == 'true' else false %}
		{% set beacon_adaptive_heat_soak_min_wait = printer["gcode_macro Ratical"].beacon_adaptive_heat_soak_min_wait|default(0)|int %}
		{% set beacon_adaptive_heat_soak_max_wait = printer["gcode_macro Ratical"].beacon_adaptive_heat_soak_max_wait|default(5400)|int %}
		{% set beacon_adaptive_heat_soak_extra_wait_after_completion = printer["gcode_macro Ratical"].beacon_adaptive_heat_soak_extra_wait_after_completion|default(0)|int %}
		{% set beacon_adaptive_heat_soak_layer_quality = printer["gcode_macro Ratical"].beacon_adaptive_heat_soak_layer_quality|default(3)|int %}
		{% set beacon_adaptive_heat_soak_maximum_first_layer_duration = printer["gcode_macro Ratical"].beacon_adaptive_heat_soak_maximum_first_layer_duration|default(1800)|int %}

		# home and abl the printer if needed  
		_BEACON_HOME_AND_ABL

		# heat chamber if needed  
		{% if chamber_temp > 0 and not already_heated %}
			_CHAMBER_HEATER_ON CHAMBER_TEMP={chamber_temp}
		{% endif %}

		# visual feedback
		_LED_BEACON_CALIBRATION_START
		
		# Absolute positioning
		G90

		{% if not already_heated %}
			# lower toolhead to heat soaking z height
			G0 Z2.5 F{z_hop_speed}
			
			# echo
			RATICAL_ECHO MSG="Waiting for calibration temperature..."

			# heat up and wait for bed and extruder calibration temperatures 
			SET_HEATER_TEMPERATURE HEATER={'extruder' if default_toolhead == 0 else 'extruder1'} TARGET=150
			SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bed_temp}
			TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp} MAXIMUM={(bed_temp + 5)}
			TEMPERATURE_WAIT SENSOR={'extruder' if default_toolhead == 0 else 'extruder1'} MINIMUM=150 MAXIMUM=155

			# Wait for bed thermal expansion
			{% if beacon_adaptive_heat_soak %}
				# Soak with a fairly generous threshold. We only need stability
				BEACON_WAIT_FOR_PRINTER_HEAT_SOAK _FORCE_THRESHOLD=100 MINIMUM_WAIT={beacon_adaptive_heat_soak_min_wait} MAXIMUM_WAIT={[beacon_adaptive_heat_soak_max_wait,3600]|max}
				{% if beacon_adaptive_heat_soak_extra_wait_after_completion > 0 %}
					RATICAL_ECHO MSG="Waiting for an additional {beacon_adaptive_heat_soak_extra_wait_after_completion} seconds after heat soak completion..."
					G4 P{(beacon_adaptive_heat_soak_extra_wait_after_completion * 1000)}
				{% endif %}
			{% else %}
				{% if bed_heat_soak_time > 0 %}
					RATICAL_ECHO MSG="Heat soaking bed for {bed_heat_soak_time} seconds..."
					G4 P{(bed_heat_soak_time * 1000)}
				{% endif %}
			{% endif %}
		{% endif %}

		# Make sure we're at safe z-height before calibration
		_Z_HOP

		# auto calibrate beacon 
		BEACON_AUTO_CALIBRATE SKIP_MULTIPOINT_PROBING=1

		# turn bed and extruder heaters off 
		{% if not automated %}
			SET_HEATER_TEMPERATURE HEATER={'extruder' if default_toolhead == 0 else 'extruder1'} TARGET=0
			SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=0
		{% endif %}

		# turn off chamber heater  
		{% if chamber_temp > 0 and not automated %}
			_CHAMBER_HEATER_OFF
		{% endif %}

		# raise toolhead to safe z-height
		_Z_HOP

		# echo
		RATICAL_ECHO MSG="Final beacon contact calibration finished!"
		{% if not automated %}
			_CONSOLE_SAVE_CONFIG
		{% endif %}

		# visual feedback
		{% if not automated %}
			_LED_BEACON_CALIBRATION_END
		{% endif %}
	{% endif %}

#####
# BEACON POKE TEST
#####
[gcode_macro BEACON_POKE_TEST]
variable_poke_result_1: -1
variable_poke_result_2: -1
variable_poke_result_3: -1
variable_poke_result_4: -1
variable_poke_result_5: -1
gcode:
	# parameters
	{% set automated = true if params._AUTOMATED|default(false)|lower == 'true' else false %}

	# config
	{% set z_hop_speed = printer.fastconfig.config.ratical_homing.z_hop_speed|float * 60 %}

	# reset results
	SET_GCODE_VARIABLE MACRO=BEACON_POKE_TEST VARIABLE=poke_result_1 VALUE=-1
	SET_GCODE_VARIABLE MACRO=BEACON_POKE_TEST VARIABLE=poke_result_2 VALUE=-1
	SET_GCODE_VARIABLE MACRO=BEACON_POKE_TEST VARIABLE=poke_result_3 VALUE=-1
	SET_GCODE_VARIABLE MACRO=BEACON_POKE_TEST VARIABLE=poke_result_4 VALUE=-1
	SET_GCODE_VARIABLE MACRO=BEACON_POKE_TEST VARIABLE=poke_result_5 VALUE=-1

	# home and abl the printer if needed  
	_BEACON_HOME_AND_ABL

	# visual feedback
	_LED_BEACON_CALIBRATION_START

	# lower toolhead to poking z-height
	G0 Z5 F{z_hop_speed}

	# poke the bed
	_BEACON_PROBE_POKE
	_BEACON_STORE_POKE I=1

	_BEACON_PROBE_POKE
	_BEACON_STORE_POKE I=2

	_BEACON_PROBE_POKE
	_BEACON_STORE_POKE I=3

	_BEACON_PROBE_POKE
	_BEACON_STORE_POKE I=4

	_BEACON_PROBE_POKE
	_BEACON_STORE_POKE I=5

	# raise toolhead to safe z-height
	_Z_HOP

	# echo
	RATICAL_ECHO MSG="Beacon poke test finished!"
	{% if not automated %}
		_BEACON_ECHO_POKE
	{% endif %}

	# visual feedback
	{% if not automated %}
		_LED_BEACON_CALIBRATION_END
	{% endif %}


[gcode_macro _BEACON_PROBE_POKE]
gcode:
	{% set poke_bottom = printer["gcode_macro Ratical"].beacon_contact_poke_bottom_limit|default(-1)|float %}
	BEACON_POKE speed=3 top=5 bottom={poke_bottom}
	BEACON_QUERY


[gcode_macro _BEACON_STORE_POKE]
gcode:
	# parameters
	{% set i = params.I|default(1)|int %}

	# get last poke result
	{% set last_z = printer.beacon.last_poke_result|default(0)|float %}

	# store beacon result
	{% if printer.beacon.last_poke_result|lower != "none" %}
		{% if printer.beacon.last_poke_result.error == 0 %}
			SET_GCODE_VARIABLE MACRO=BEACON_POKE_TEST VARIABLE={"poke_result_%s" % i} VALUE={printer.beacon.last_poke_result.latency}
		{% endif %}
	{% endif %}


[gcode_macro _BEACON_CHECK_POKE]
gcode:
	# get results
	{% set p1 = printer["gcode_macro BEACON_POKE_TEST"].poke_result_1|int %}
	{% set p2 = printer["gcode_macro BEACON_POKE_TEST"].poke_result_2|int %}
	{% set p3 = printer["gcode_macro BEACON_POKE_TEST"].poke_result_3|int %}
	{% set p4 = printer["gcode_macro BEACON_POKE_TEST"].poke_result_4|int %}
	{% set p5 = printer["gcode_macro BEACON_POKE_TEST"].poke_result_5|int %}

	# check for poke errors
	{% if p1 == -1 or p2 == -1 or p3 == -1 or p4 == -1 or p5 == -1 %}
		_LED_BEACON_CALIBRATION_ERROR
		{ action_raise_error("Beacon poke test error!") }
	{% endif %}

	# check average result
	{% set avg = (p1 + p2 + p3 + p4 + p5) / 5 %}
	{% if avg > 6 %}
		_LED_BEACON_CALIBRATION_ERROR
		{ action_raise_error("Beacon poke test failed!") }
	{% endif %}


[gcode_macro _BEACON_ECHO_POKE]
gcode:
	# get results
	{% set p1 = printer["gcode_macro BEACON_POKE_TEST"].poke_result_1|int %}
	{% set p2 = printer["gcode_macro BEACON_POKE_TEST"].poke_result_2|int %}
	{% set p3 = printer["gcode_macro BEACON_POKE_TEST"].poke_result_3|int %}
	{% set p4 = printer["gcode_macro BEACON_POKE_TEST"].poke_result_4|int %}
	{% set p5 = printer["gcode_macro BEACON_POKE_TEST"].poke_result_5|int %}

	# get average latency
	{% set avg = (p1 + p2 + p3 + p4 + p5) / 5 %}

	# get note
	{% if avg <= 1 %}
		{% set type = "success" %}
		{% set note = "Extremely low noise, rarely achieved" %}
	{% elif avg > 1 and avg <= 4 %}
		{% set type = "info" %}
		{% set note = "Excellent performance for a typical printer" %}
	{% elif avg > 4 and avg <= 8 %}
		{% set type = "warning" %}
		{% set note = "Acceptable performance, machine may have considerable cyclic axis noise" %}
	{% elif avg > 8 and avg <= 11 %}
		{% set type = "alert" %}
		{% set note = "Not ideal, may want to verify proper mounting or use thinner stackups" %}
	{% elif avg > 11 %}
		{% set type = "alert" %}
		{% set note = "Reason for concern, present setup may be risky to continue with" %}
	{% endif %}

	# console echo
	CONSOLE_ECHO TITLE="Beacon poke test result:" TYPE={type} MSG={'"Average latency: %.2f_N_%s"' % (avg, note)}


#####
# BEACON NOZZLE TEMPERATURE OFFSET CALIBRATION
#####
[gcode_macro BEACON_CALIBRATE_NOZZLE_TEMP_OFFSET]
variable_reference_z: 0.0
gcode:
	# parameters
	{% set automated = true if params._AUTOMATED|default(false)|lower == 'true' else false %}

	# config
	{% set speed = printer["gcode_macro Ratical"].macro_travel_speed|float * 60 %}
	{% set default_toolhead = printer["gcode_macro Ratical"].default_toolhead|default(0)|int %}
	{% set poke_bottom = printer["gcode_macro Ratical"].beacon_contact_poke_bottom_limit|default(-1)|float %}

	# beacon config
	{% set beacon_contact_start_print_true_zero = true if printer["gcode_macro Ratical"].beacon_contact_start_print_true_zero|default(false)|lower == 'true' else false %}

	{% if beacon_contact_start_print_true_zero %}

		# home and abl the printer if needed  
		_BEACON_HOME_AND_ABL

		# visual feedback
		_LED_BEACON_CALIBRATION_START

		# echo
		RATICAL_ECHO PREFIX="BEACON" MSG="Nozzle temperature offset calibration..."

		# settle the mechanics down  
		{% for i in range(10) %}
			beacon_poke speed=3 top=5 bottom={poke_bottom}
		{% endfor %}

		# get and set start temperature offset 
		_BEACON_PROBE_NOZZLE_TEMP_OFFSET TEMP=150
		_BEACON_STORE_NOZZLE_TEMP_OFFSET TEMP=150

		# get and set end temperature offset
		_BEACON_PROBE_NOZZLE_TEMP_OFFSET TEMP=250
		_BEACON_STORE_NOZZLE_TEMP_OFFSET TEMP=250

		# get and set start temperature offset 
		_BEACON_PROBE_NOZZLE_TEMP_OFFSET TEMP=150
		_BEACON_STORE_NOZZLE_TEMP_OFFSET TEMP=150

		# get and set end temperature offset
		_BEACON_PROBE_NOZZLE_TEMP_OFFSET TEMP=250
		_BEACON_STORE_NOZZLE_TEMP_OFFSET TEMP=250

		# move back to home position
		_MOVE_TO_SAFE_Z_HOME Z_HOP=True

		# turn heater off
		SET_HEATER_TEMPERATURE HEATER={"extruder" if default_toolhead == 0 else "extruder1"} TARGET=0

		# echo results
		{% if not automated %}
			_BEACON_ECHO_NOZZLE_TEMP_OFFSETS
		{% endif %}

		# visual feedback
		{% if not automated %}
			_LED_BEACON_CALIBRATION_END
		{% endif %}

	{% endif %}


[gcode_macro _BEACON_PROBE_NOZZLE_TEMP_OFFSET]
gcode:
	# parameters
	{% set temp = params.TEMP|int %}

	# config
	{% set z_speed = printer["gcode_macro Ratical"].macro_z_speed|float * 60 %}
	{% set default_toolhead = printer["gcode_macro Ratical"].default_toolhead|default(0)|int %}
	{% set hotend_heat_soak_time = printer["gcode_macro Ratical"].hotend_heat_soak_time|default(0)|int %}

	# ratical variables file
	{% set svv = printer.save_variables.variables %}

	# wait for noozle to reach the probing temperature
	RATICAL_ECHO PREFIX="BEACON" MSG="Waiting for nozzle to reach {temp}°C..."
	SET_HEATER_TEMPERATURE HEATER={"extruder" if default_toolhead == 0 else "extruder1"} TARGET={temp}
	TEMPERATURE_WAIT SENSOR={"extruder" if default_toolhead == 0 else "extruder1"} MINIMUM={temp} MAXIMUM={temp + 2}

	# Wait for extruder thermal expansion
	{% if hotend_heat_soak_time > 0 %}
		RATICAL_ECHO MSG="Heat soaking hotend for {hotend_heat_soak_time} seconds..."
		G4 P{(hotend_heat_soak_time * 1000)}
	{% endif %}

	# probe
	RATICAL_ECHO PREFIX="BEACON" MSG="Probing with nozzle temperature {temp}°C..."
	PROBE PROBE_METHOD=contact PROBE_SPEED=3 LIFT_SPEED=15 SAMPLES=5 SAMPLE_RETRACT_DIST=3 SAMPLES_TOLERANCE=0.005 SAMPLES_TOLERANCE_RETRIES=10 SAMPLES_RESULT=median
	BEACON_QUERY

	# raise z
	G0 Z5 F{z_speed}


[gcode_macro _BEACON_STORE_NOZZLE_TEMP_OFFSET]
gcode:
	# parameters
	{% set temp = params.TEMP|int %}

	# config
	{% set default_toolhead = printer["gcode_macro Ratical"].default_toolhead|default(0)|int %}

	# ratical variables file
	{% set svv = printer.save_variables.variables %}

	# get last probe result
	{% set last_z = printer.beacon.last_z_result|default(0)|float %}

	# set temperature offset
	{% if temp == 150 %}
		SET_GCODE_VARIABLE MACRO=BEACON_CALIBRATE_NOZZLE_TEMP_OFFSET VARIABLE=reference_z VALUE={last_z}
	{% else %}
		{% set reference_z = printer["gcode_macro BEACON_CALIBRATE_NOZZLE_TEMP_OFFSET"].reference_z|default(0)|float %}
		SAVE_VARIABLE VARIABLE=nozzle_expansion_coefficient_t{default_toolhead} VALUE={(last_z - reference_z)}
	{% endif %}


[gcode_macro _BEACON_ECHO_NOZZLE_TEMP_OFFSETS]
gcode:
	# config
	{% set default_toolhead = printer["gcode_macro Ratical"].default_toolhead|default(0)|int %}

	# ratical variables file
	{% set svv = printer.save_variables.variables %}

	# echo
	{% if default_toolhead == 0 %}
		CONSOLE_ECHO TYPE="info" MSG={'"T0 expansion coefficient %.6f"' % svv.nozzle_expansion_coefficient_t0}
	{% else %}
		CONSOLE_ECHO TYPE="info" MSG={'"T1 expansion coefficient %.6f"' % svv.nozzle_expansion_coefficient_t1}
	{% endif %}


#####
# BEACON NOZZLE TEMPERATURE OFFSET COMPENSATION
#####
#zzz todo: rename to _BEACON_UPDATE_NOZZLE_TEMP_OFFSET
[gcode_macro _BEACON_SET_NOZZLE_TEMP_OFFSET]
description: "Set the thermal expansion z offset for the active toolhead based on the current extruder target temperature and thermal expansion coefficient."
gcode:
	{% if params.RESET is defined %}
		CONSOLE_ECHO TITLE="Deprecated parameter" TYPE="warning" MSG="The RESET parameter is no longer supported and has no effect."
		_DEBUG_ECHO_STACK_TRACE
	{% endif %}

	{% if params.TOOLHEAD is defined %}
		CONSOLE_ECHO TITLE="Deprecated parameter" TYPE="warning" MSG="The TOOLHEAD parameter is no longer supported and has no effect. The macro now automatically determines the current toolhead."
		_DEBUG_ECHO_STACK_TRACE
	{% endif %}

	{% set beacon_contact_expansion_compensation = true if printer["gcode_macro Ratical"].beacon_contact_expansion_compensation|default(false)|lower == 'true' else false %}
	{% if beacon_contact_expansion_compensation %}
		# config 
		{% set z_speed = printer["gcode_macro Ratical"].macro_z_speed|float * 60 %}

		# beacon config
		{% set beacon_contact_true_zero_temp = printer["gcode_macro Ratical"].beacon_contact_true_zero_temp|default(150)|int %}
		{% set beacon_contact_start_print_true_zero = true if printer["gcode_macro Ratical"].beacon_contact_start_print_true_zero|default(false)|lower == 'true' else false %}

		# deterimine the current toolhead, or for copy/mirror, the dominant toolhead
		{% set default_toolhead = printer["gcode_macro Ratical"].default_toolhead|default(0)|int %}
		{% set toolhead = default_toolhead %}
		{% if printer["dual_carriage"] is defined %}
			# Note: For copy/mirror, the default toolhead is dominant.
			{% set current_idex_mode = printer["dual_carriage"].carriage_1|lower %}
			{% set toolhead = 1 if current_idex_mode=='primary' else default_toolhead %}
		{% endif %}

		# ratical variables file
		{% set svv = printer.save_variables.variables %}

		# get coefficient
		{% set nozzle_expansion_coefficient_t0 = svv.nozzle_expansion_coefficient_t0|default(0)|float %}
		{% if printer["dual_carriage"] is defined %}
			{% set nozzle_expansion_coefficient_t1 = svv.nozzle_expansion_coefficient_t1|default(0)|float %}
		{% endif %}

		# get extruder target temperature
		{% set temp = printer['extruder' if toolhead == 0 else 'extruder1'].target|float %}

		# calculate new offset
		{% set temp_delta = temp - beacon_contact_true_zero_temp %}
		{% set expansion_coefficient = nozzle_expansion_coefficient_t0 if toolhead == 0 else nozzle_expansion_coefficient_t1 %}
		{% set expansion_offset = temp_delta * (expansion_coefficient / 100) %}

		# set new offset
		SET_NAMED_OFFSET NAME=hotend_thermal_expansion Z={expansion_offset} MOVE=1 MOVE_SPEED={z_speed}

		# echo
		RATICAL_ECHO PREFIX="BEACON" MSG={'"Nozzle expansion offset of %.6fmm applied to T%s"' % (expansion_offset, toolhead)}
		DEBUG_ECHO PREFIX="_BEACON_SET_NOZZLE_TEMP_OFFSET" MSG="toolhead: {toolhead}, coefficient: {expansion_coefficient|round(6)}, temp_delta: {temp_delta|round(1)},  expansion_offset: {expansion_offset|round(6)}"

	{% endif %}

#####
# BEACON MEASURE BEACON OFFSET
#####
[gcode_macro BEACON_MEASURE_BEACON_OFFSET]
variable_needs_compensation: False
variable_reference_z: 0.0
variable_front: 0.0
variable_front_left: 0.0
variable_front_right: 0.0
variable_back: 0.0
variable_back_left: 0.0
variable_back_right: 0.0
variable_right: 0.0
variable_left: 0.0
variable_margin_x: 40
variable_margin_y: 40
gcode:
	# config
	{% set speed = printer["gcode_macro Ratical"].macro_travel_speed|float * 60 %}
	{% set printable_x_max = printer["gcode_macro Ratical"].printable_x_max|float %}
	{% set printable_y_max = printer["gcode_macro Ratical"].printable_y_max|float %}
	{% set safe_home_x, safe_home_y = printer.ratical.safe_home_position %}
	{% set poke_bottom = printer["gcode_macro Ratical"].beacon_contact_poke_bottom_limit|default(-1)|float %}

	# beacon config
	{% set beacon_contact_start_print_true_zero = true if printer["gcode_macro Ratical"].beacon_contact_start_print_true_zero|default(false)|lower == 'true' else false %}

	{% if beacon_contact_start_print_true_zero %}

		# reset varaible  
		SET_GCODE_VARIABLE MACRO=BEACON_MEASURE_BEACON_OFFSET VARIABLE=needs_compensation VALUE=False

		# home and abl the printer if needed  
		_BEACON_HOME_AND_ABL

		# visual feedback
		_LED_BEACON_CALIBRATION_START

		# echo  
		RATICAL_ECHO PREFIX="BEACON" MSG="Measure beacon offset..."

		# settle the mechanics down  
		{% for i in range(10) %}
			beacon_poke speed=3 top=5 bottom={poke_bottom}
		{% endfor %}

		# probe reference location
		_BEACON_OFFSET_COMPARE
		_BEACON_STORE_BEACON_OFFSET LOCATION="center"
		
		# probe front left
		G0 X{margin_x} Y{margin_y} F{speed}
		_BEACON_OFFSET_COMPARE
		_BEACON_STORE_BEACON_OFFSET LOCATION="front_left"

		# probe front
		G0 X{safe_home_x} Y{margin_y} F{speed}
		_BEACON_OFFSET_COMPARE
		_BEACON_STORE_BEACON_OFFSET LOCATION="front"

		# probe front right
		G0 X{(printable_x_max - margin_x)} Y{margin_y} F{speed}
		_BEACON_OFFSET_COMPARE
		_BEACON_STORE_BEACON_OFFSET LOCATION="front_right"

		# probe right
		G0 X{(printable_x_max - margin_x)} Y{safe_home_y} F{speed}
		_BEACON_OFFSET_COMPARE
		_BEACON_STORE_BEACON_OFFSET LOCATION="right"

		# probe back right
		G0 X{(printable_x_max - margin_x)} Y{(printable_y_max - margin_y)} F{speed}
		_BEACON_OFFSET_COMPARE
		_BEACON_STORE_BEACON_OFFSET LOCATION="back_right"

		# probe back
		G0 X{safe_home_x} Y{(printable_y_max - margin_y)} F{speed}
		_BEACON_OFFSET_COMPARE
		_BEACON_STORE_BEACON_OFFSET LOCATION="back"

		# probe back left
		G0 X{margin_x} Y{(printable_y_max - margin_y)} F{speed}
		_BEACON_OFFSET_COMPARE
		_BEACON_STORE_BEACON_OFFSET LOCATION="back_left"

		# probe left
		G0 X{margin_x} Y{safe_home_y} F{speed}
		_BEACON_OFFSET_COMPARE
		_BEACON_STORE_BEACON_OFFSET LOCATION="left"

		# move back to home position
		_MOVE_TO_SAFE_Z_HOME Z_HOP=True

		# echo results
		_BEACON_ECHO_BEACON_OFFSET

		# visual feedback
		_LED_BEACON_CALIBRATION_END

	{% endif %}


[gcode_macro _BEACON_STORE_BEACON_OFFSET]
gcode:
	# parameters
	{% set location = params.LOCATION|lower %}

	# get last probe result
	{% set last_z = printer.beacon.last_offset_result["delta"]|default(0)|float %}

	# set gantry offset
	{% if location == "center" %}
		SET_GCODE_VARIABLE MACRO=BEACON_MEASURE_BEACON_OFFSET VARIABLE=reference_z VALUE={last_z}
	{% else %}
		{% set reference_z = printer["gcode_macro BEACON_MEASURE_BEACON_OFFSET"].reference_z|default(0)|float %}
		SET_GCODE_VARIABLE MACRO=BEACON_MEASURE_BEACON_OFFSET VARIABLE={location} VALUE={(last_z - reference_z)}
	{% endif %}


[gcode_macro _BEACON_ECHO_BEACON_OFFSET]
gcode:
	# get results
	{% set reference_z = printer["gcode_macro BEACON_MEASURE_BEACON_OFFSET"].reference_z|default(0)|float * 1000 %}
	{% set front_left = printer["gcode_macro BEACON_MEASURE_BEACON_OFFSET"].front_left|default(0)|float * 1000 %}
	{% set front = printer["gcode_macro BEACON_MEASURE_BEACON_OFFSET"].front|default(0)|float * 1000 %}
	{% set front_right = printer["gcode_macro BEACON_MEASURE_BEACON_OFFSET"].front_right|default(0)|float * 1000 %}
	{% set right = printer["gcode_macro BEACON_MEASURE_BEACON_OFFSET"].right|default(0)|float * 1000 %}
	{% set back_right = printer["gcode_macro BEACON_MEASURE_BEACON_OFFSET"].back_right|default(0)|float * 1000 %}
	{% set back = printer["gcode_macro BEACON_MEASURE_BEACON_OFFSET"].back|default(0)|float * 1000 %}
	{% set back_left = printer["gcode_macro BEACON_MEASURE_BEACON_OFFSET"].back_left|default(0)|float * 1000 %}
	{% set left = printer["gcode_macro BEACON_MEASURE_BEACON_OFFSET"].left|default(0)|float * 1000 %}

	{% set line_1 = "Front left:    %.6fμm" % (front_left) %}
	{% set line_2 = "Front center:  %.6fμm" % (front) %}
	{% set line_3 = "Front right:   %.6fμm" % (front_right) %}
	{% set line_4 = "Left center:   %.6fμm" % (left) %}
	{% set line_5 = "Right center:  %.6fμm" % (right) %}
	{% set line_6 = "Back left:     %.6fμm" % (back_left) %}
	{% set line_7 = "Back center:   %.6fμm" % (back) %}
	{% set line_8 = "Back right:    %.6fμm" % (back_right) %}

	{% set max_value = [(front_left|abs), (front|abs), (front_right|abs), (left|abs), (right|abs), (back_left|abs), (back|abs), (back_right|abs)]|max %}
	{% if max_value <= 50 %}
		{% set type = "success" %}
		{% set recommendation = "Very low beacon offset: %.6fμm._N_No beacon scan compensation needed." % max_value %}
	{% elif max_value > 50 and max_value <= 100 %}
		{% set type = "info" %}
		{% set recommendation = "Low beacon offset: %.6fμm._N_You may experience first layer inconsistensies, consider beacon scan compensation." % max_value %}
		SET_GCODE_VARIABLE MACRO=BEACON_MEASURE_BEACON_OFFSET VARIABLE=needs_compensation VALUE=True
	{% elif max_value > 100 and max_value <= 150 %}
		{% set type = "warning" %}
		{% set recommendation = "High beacon offset: %.6fμm._N_High chance of first layer problems, beacon scan compensation is highly encouraged." % max_value %}
		SET_GCODE_VARIABLE MACRO=BEACON_MEASURE_BEACON_OFFSET VARIABLE=needs_compensation VALUE=True
	{% elif max_value > 150 and max_value <= 200 %}
		{% set type = "alert" %}
		{% set recommendation = "Very High beacon offset: %.6fμm._N_You will encounter first layer problems on large prints unless you activate beacon scan compensation." % max_value %}
		SET_GCODE_VARIABLE MACRO=BEACON_MEASURE_BEACON_OFFSET VARIABLE=needs_compensation VALUE=True
	{% elif max_value > 200 %}
		{% set type = "alert" %}
		{% set recommendation = "Extremely high beacon offset: %.6fμm._N_You have significant scan/contact inconsistency which is indicative of mechanical problems, please investigate before resorting to software compensation." % max_value %}
		SET_GCODE_VARIABLE MACRO=BEACON_MEASURE_BEACON_OFFSET VARIABLE=needs_compensation VALUE=True
	{% endif %}

	# console echo
	CONSOLE_ECHO TITLE="Beacon offset relative to the center" TYPE={type} MSG={'"_N_%s_N__N_%s_N_%s_N_%s_N_%s_N_%s_N_%s_N_%s_N_%s"' % (recommendation, line_1, line_2, line_3, line_4, line_5, line_6, line_7, line_8)}


#####
# BEACON SCAN COMPENSATION
#####
[gcode_macro BEACON_CREATE_SCAN_COMPENSATION_MESH]
gcode:
	# parameters
	{% set bed_temp = params.BED_TEMP|default(85)|int %}
	{% set chamber_temp = params.CHAMBER_TEMP|default(0)|int %}
	{% set profile = params.PROFILE|default("auto")|string %}
	{% set automated = true if params._AUTOMATED|default(false)|lower == 'true' else false %}
	{% set keep_temp_meshes = params.KEEP_TEMP_MESHES|default(0) %}

	# config
	{% set default_toolhead = printer["gcode_macro Ratical"].default_toolhead|default(0)|int %}
	{% set beacon_scan_compensation_enable = true if printer["gcode_macro Ratical"].beacon_scan_compensation_enable|default(false)|lower == 'true' else false %}
	{% set beacon_contact_start_print_true_zero = printer["gcode_macro Ratical"].beacon_contact_start_print_true_zero|default(false)|lower == 'true' %}
	{% set beacon_contact_calibrate_model_on_true_zero = printer["gcode_macro Ratical"].beacon_contact_calibrate_model_on_true_zero|default(false)|lower == 'true' %}	
	{% set desired_spacing = printer["gcode_macro Ratical"].beacon_scan_compensation_desired_spacing|float %}
	{% set bed_heat_soak_time = printer["gcode_macro Ratical"].bed_heat_soak_time|default(0)|int %}
	{% set hotend_heat_soak_time = printer["gcode_macro Ratical"].hotend_heat_soak_time|default(0)|int %}
	{% set z_speed = printer["gcode_macro Ratical"].macro_z_speed|float * 60 %}

	# beacon adaptive heat soak config
	{% set beacon_adaptive_heat_soak = true if printer["gcode_macro Ratical"].beacon_adaptive_heat_soak|default(false)|lower == 'true' else false %}
	{% set beacon_adaptive_heat_soak_min_wait = printer["gcode_macro Ratical"].beacon_adaptive_heat_soak_min_wait|default(0)|int %}
	{% set beacon_adaptive_heat_soak_max_wait = printer["gcode_macro Ratical"].beacon_adaptive_heat_soak_max_wait|default(5400)|int %}
	{% set beacon_adaptive_heat_soak_extra_wait_after_completion = printer["gcode_macro Ratical"].beacon_adaptive_heat_soak_extra_wait_after_completion|default(0)|int %}

	{% if not beacon_scan_compensation_enable %}
		RATICAL_ECHO MSG="Beacon scan compensation is disabled!"

	{% else %}

		# activate IDEX default
		{% if printer["dual_carriage"] is defined %}
			_IDEX_SINGLE INIT=1
		{% endif %}
		
		# home the printer if needed  
		MAYBE_HOME

		# Go to safe home
		_MOVE_TO_SAFE_Z_HOME Z_HOP=True

		# visual feedback
		_LED_BEACON_CALIBRATION_START

		# heat chamber if needed  
		{% if chamber_temp > 0 %}
			_CHAMBER_HEATER_ON CHAMBER_TEMP={chamber_temp}
		{% endif %}

		# heat up printer
		SET_HEATER_TEMPERATURE HEATER={'extruder' if default_toolhead == 0 else 'extruder1'} TARGET=150
		SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bed_temp}

		# wait for temperatures 
		RATICAL_ECHO MSG="Please wait..."
		TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp} MAXIMUM={(bed_temp + 5)}
		TEMPERATURE_WAIT SENSOR={'extruder' if default_toolhead == 0 else 'extruder1'} MINIMUM=150 MAXIMUM=155

		# Do true zero now that the bed is at temperature. We need to do true zero here even if
		# beacon_contact_start_print_true_zero is false. But we only create a fresh model if so configured.
		{% if beacon_contact_start_print_true_zero and beacon_contact_calibrate_model_on_true_zero %}
			BEACON_AUTO_CALIBRATE SKIP_MULTIPOINT_PROBING=1
		{% else %}
			BEACON_AUTO_CALIBRATE SKIP_MODEL_CREATION=1 SKIP_MULTIPOINT_PROBING=1
		{% endif %}

		# Wait for bed thermal expansion
		_MOVE_TO_SAFE_Z_HOME
		# Must be close to bed for soaking and for beacon proximity measurements. Use 2.5 instead of 2 to allow for
		# more gantry deflection.
		G1 Z2.5 F{z_speed}
		{% if beacon_adaptive_heat_soak %}
			# The cotemporal compensation mesh creation strategy is tolerant to some residual z-rate drift, so we can
			# use a relatively moderate threshold to avoid excessive soak times.
			BEACON_WAIT_FOR_PRINTER_HEAT_SOAK _FORCE_THRESHOLD=100 MINIMUM_WAIT={beacon_adaptive_heat_soak_min_wait} MAXIMUM_WAIT={[beacon_adaptive_heat_soak_max_wait,9000]|max}
			{% if beacon_adaptive_heat_soak_extra_wait_after_completion > 0 %}
				RATICAL_ECHO MSG="Waiting for an additional {beacon_adaptive_heat_soak_extra_wait_after_completion} seconds after heat soak completion..."
				G4 P{(beacon_adaptive_heat_soak_extra_wait_after_completion * 1000)}
			{% endif %}				
		{% else %}
			{% if bed_heat_soak_time > 0 %}
				RATICAL_ECHO MSG="Heat soaking bed for {bed_heat_soak_time} seconds..."
				G4 P{(bed_heat_soak_time * 1000)}
			{% endif %}
		{% endif %}

		# Soak hotend if not already implicitly covered by bed heat soak
		{% if not (beacon_adaptive_heat_soak or bed_heat_soak_time > 0) %}
			# Wait for extruder thermal expansion
			{% if hotend_heat_soak_time > 0 %}
				RATICAL_ECHO MSG="Heat soaking hotend for {hotend_heat_soak_time} seconds..."
				G4 P{(hotend_heat_soak_time * 1000)}
			{% endif %}
		{% endif %}

		# Force automatic bed leveling
		{% if printer.z_tilt is defined %}
			RATICAL_ECHO MSG="Adjusting Z tilt..."
			Z_TILT_ADJUST
			RATICAL_ECHO MSG="Rehoming Z after Z tilt adjustment..."
		{% endif %}
		{% if printer.quad_gantry_level is defined %}
			RATICAL_ECHO MSG="Running quad gantry leveling..."
			QUAD_GANTRY_LEVEL 
			RATICAL_ECHO MSG="Rehoming Z after quad gantry leveling..."
		{% endif %}
		
		# create compensation mesh
		_BEACON_CREATE_SCAN_COMPENSATION_MESH_CORE PROFILE="{profile}" DESIRED_SPACING={desired_spacing} CHAMBER_TEMP={chamber_temp} KEEP_TEMP_MESHES={keep_temp_meshes}

		# turn bed and extruder heaters off 
		{% if not automated %}
			SET_HEATER_TEMPERATURE HEATER={'extruder' if default_toolhead == 0 else 'extruder1'} TARGET=0
			SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=0
		{% endif %}

		# turn off chamber heater  
		{% if chamber_temp > 0 and not automated %}
			_CHAMBER_HEATER_OFF
		{% endif %}

		{% if automated %}
			# Go to safe home
			_MOVE_TO_SAFE_Z_HOME Z_HOP=True

			# home z
			BEACON_AUTO_CALIBRATE SKIP_MODEL_CREATION=1 SKIP_MULTIPOINT_PROBING=1
		{% endif %}

		# visual feedback
		{% if not automated %}
			_LED_BEACON_CALIBRATION_END
		{% endif %}

		# echo
		RATICAL_ECHO MSG="Beacon scan compensation mesh created!"

		# save config
		{% if not automated %}
			RATICAL_ECHO MSG="Saving config and restarting klipper..."
			SAVE_CONFIG
		{% endif %}

	{% endif %}


[gcode_macro _BEACON_APPLY_SCAN_COMPENSATION_IF_ENABLED]
gcode:
	# beacon config
	{% set beacon_scan_compensation_profile = printer["gcode_macro Ratical"].beacon_scan_compensation_profile %}
	{% set beacon_scan_compensation_enable = true if printer["gcode_macro Ratical"].beacon_scan_compensation_enable|default(false)|lower == 'true' else false %}

	DEBUG_ECHO PREFIX="_BEACON_APPLY_SCAN_COMPENSATION_IF_ENABLED" MSG="beacon_scan_compensation_profile {beacon_scan_compensation_profile}, beacon_scan_compensation_enable {beacon_scan_compensation_enable}"

	{% if beacon_scan_compensation_enable %}
		BEACON_APPLY_SCAN_COMPENSATION PROFILE="{beacon_scan_compensation_profile}"
	{% endif %}

[gcode_macro _START_PRINT_PREFLIGHT_CHECK_BEACON_MODEL]
gcode:
	# Passed as params to avoid duplication of defaulting
	{% set beacon_contact_start_print_true_zero = params.BEACON_CONTACT_START_PRINT_TRUE_ZERO|lower == 'true' %}
	{% set beacon_contact_calibrate_model_on_true_zero = params.beacon_contact_calibrate_model_on_true_zero|lower == 'true' %}

	# Error early with a clear message if a Beacon model is required but not active.
	{% if printer.fastconfig.settings.beacon is defined and not printer.beacon.model %}
		{% set beacon_model_required_for_true_zero = beacon_contact_start_print_true_zero and not beacon_contact_calibrate_model_on_true_zero %}
		{% set beacon_model_required_for_homing = 
			printer.fastconfig.settings.stepper_z.endstop_pin == 'probe:z_virtual_endstop'
			and (( printer.fastconfig.settings.beacon.home_method|default('proximity')|lower == 'proximity'
					and printer["gcode_macro Ratical"].beacon_contact_z_homing|default(false)|lower != 'true')
				or ( printer.fastconfig.settings.beacon.default_probe_method|default('proximity')|lower == 'proximity'
					and printer["gcode_macro Ratical"].beacon_contact_z_tilt_adjust|default(false)|lower != 'true' )) %}
		{% if beacon_model_required_for_homing or beacon_model_required_for_true_zero %}
			_LED_START_PRINTING_ERROR
			{ action_raise_error("An active Beacon model is required. Have you performed initial Beacon calibration?") }
		{% endif %}
	{% endif %}


[gcode_macro _START_PRINT_PREFLIGHT_CHECK_BEACON_SCAN_COMPENSATION]
gcode:
	{% set beacon_scan_compensation_profile = printer["gcode_macro Ratical"].beacon_scan_compensation_profile %}
	{% set beacon_scan_compensation_enable = true if printer["gcode_macro Ratical"].beacon_scan_compensation_enable|default(false)|lower == 'true' else false %}
	{% set bed_temp_mismatch_is_error = true if printer["gcode_macro Ratical"].beacon_scan_compensation_bed_temp_mismatch_is_error|default(false)|lower == 'true' else false %}

	{% set bed_temp = params.BED_TEMP|default(0)|float %}
	{% if bed_temp == 0 %}
		{% set bed_temp = printer.heater_bed.temperature %}
	{% endif %}

	DEBUG_ECHO PREFIX="_START_PRINT_PREFLIGHT_CHECK_BEACON" MSG="beacon_scan_compensation_profile={beacon_scan_compensation_profile}, beacon_scan_compensation_enable={beacon_scan_compensation_enable}, bed_temp={bed_temp}"

	{% if beacon_scan_compensation_enable %}
		_VALIDATE_COMPENSATION_MESH_PROFILE PROFILE="{beacon_scan_compensation_profile}" TITLE="Check Beacon scan compensation profile" SUBJECT="Configured compensation profile '{beacon_scan_compensation_profile}'" COMPARE_BED_TEMP={bed_temp} COMPARE_BED_TEMP_IS_ERROR={bed_temp_mismatch_is_error}
	{% endif %}

[gcode_macro _BEACON_MAYBE_SCAN_COMPENSATION]
gcode:
	# parameters
	{% set bed_temp = params.BED_TEMP|default(85)|int %}
	{% set chamber_temp = params.CHAMBER_TEMP|default(0)|int %}

	# beacon config
	{% set needs_scan_compensation = true if printer["gcode_macro BEACON_MEASURE_BEACON_OFFSET"].needs_compensation|default(false)|lower == 'true' else false %}

	{% if needs_scan_compensation %}
		BEACON_CREATE_SCAN_COMPENSATION_MESH _AUTOMATED=True BED_TEMP={bed_temp} CHAMBER_TEMP={chamber_temp}
	{% endif %}


#####
# BEACON UTILS
#####
[gcode_macro _BEACON_HOME_AND_ABL]
gcode:
	# activate IDEX default
	{% if printer["dual_carriage"] is defined %}
		_IDEX_SINGLE INIT=1
	{% endif %}
	
	# home X/Y if not homed already
	MAYBE_HOME X=True Y=True

	# Go to safe home
	_MOVE_TO_SAFE_Z_HOME Z_HOP=True

	# Home z with contact
	BEACON_AUTO_CALIBRATE SKIP_MODEL_CREATION=1 SKIP_MULTIPOINT_PROBING=1

	# automatic bed leveling
	{% set needs_rehoming = False %}
	{% if printer.z_tilt is defined and not printer.z_tilt.applied %}
		RATICAL_ECHO MSG="Adjusting Z tilt..."
		Z_TILT_ADJUST
		RATICAL_ECHO MSG="Rehoming Z after Z tilt adjustment..."
		{% set needs_rehoming = True %}
	{% endif %}
	{% if printer.quad_gantry_level is defined and not printer.quad_gantry_level.applied %}
	 	RATICAL_ECHO MSG="Running quad gantry leveling..."
		QUAD_GANTRY_LEVEL 
		RATICAL_ECHO MSG="Rehoming Z after quad gantry leveling..."
		{% set needs_rehoming = True %}
	{% endif %}
	
	# Go to safe home
	_MOVE_TO_SAFE_Z_HOME Z_HOP=True

	# Home again as Z will have changed after automatic bed leveling.
	{% if needs_rehoming %}
		BEACON_AUTO_CALIBRATE SKIP_MODEL_CREATION=1 SKIP_MULTIPOINT_PROBING=1
	{% endif %}

[gcode_macro SAVE_Z_OFFSET]
description: Deprecated. Use the Klipper standard Z_OFFSET_APPLY_PROBE macro instead, or in Mainsail use the SAVE button in the Z-OFFSET section.
gcode:
	{% set beacon_contact_start_print_true_zero = printer["gcode_macro Ratical"].beacon_contact_start_print_true_zero|default('false')|lower == 'true' %}
	{% set msg = "SAVE_Z_OFFSET is deprecated. Use the Klipper standard Z_OFFSET_APPLY_PROBE macro instead,_N_or in Mainsail use the SAVE button in the Z-OFFSET section."%}
	{% if not (printer.fastconfig.settings.beacon is defined and beacon_contact_start_print_true_zero) %}
		{% set msg = msg + "_N_You must then use the SAVE_CONFIG command to persist the change." %}
	{% endif %}
	CONSOLE_ECHO TYPE="error" MSG="{msg}"

[gcode_macro _BEACON_OFFSET_COMPARE]
gcode:
	# echo
	RATICAL_ECHO PREFIX="BEACON" MSG="Probing..."

	# probe
	BEACON_OFFSET_COMPARE SAMPLES_DROP=1 SAMPLES=3
	BEACON_QUERY
# WARNING. DO NOT EDIT THIS FILE.
# To override settings from this file, you can copy and paste the relevant
# sections into your printer.cfg and change it there.
# WARNING: it is NOT recommended to override board_pins aliases, 
# use the boards pin names directly in your printer.cfg instead. 
# Look up the pins you need in the boards pinout diagram.

[board_pins ldo-orbitool-o2s]
mcu: toolboard
aliases:
	# endstop
	x_endstop_pin=PA2,

	# TMC2240
	e_step_pin=PB3,
	e_dir_pin=PB4,
	e_enable_pin=PC14,
	e_uart_pin=PC13,
	e_diag_pin=null,

	# hotend
	e_heater_pin=PB9,
	e_sensor_pin=PA1,
	e_power_draw_pin=PA0,
	
	# adxl345 cs pin
	adxl345_cs_pin=PA4,
	
	# fans
	fan_part_cooling_pin=PA10,
	fan_toolhead_cooling_pin=PB15,
	fan_toolhead_cooling_tach_pin=PB12,
	
	# 4 pin fan
	4p_fan_part_cooling_pin=PB0, 4p_fan_part_cooling_tach_pin=PA14, 4p_fan_part_cooling_enable_pin=PB14,

	# filament sensors
	filament_sensor_runout_pin=PA8,
	filament_sensor_motion_pin=PA9,

	# other
	run_led_pin=PB13,
	rgb_led_data_pin=PC15,

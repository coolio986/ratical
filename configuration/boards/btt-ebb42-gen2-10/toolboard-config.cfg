# WARNING. DO NOT EDIT THIS FILE.
# To override settings from this file, you can copy and paste the relevant
# sections into your printer.cfg and change it there.
# WARNING: it is NOT recommended to override board_pins aliases, 
# use the boards pin names directly in your printer.cfg instead. 
# Look up the pins you need in the boards pinout diagram.

[board_pins btt-ebb42-gen2-10]
mcu: toolboard
aliases:
	# endstop
	x_endstop_pin=PA2,

	# TMC2209
	e_step_pin=PD3,
	e_dir_pin=PD2,
	e_enable_pin=PB6,
	e_uart_pin=PB3,
	e_diag_pin=null, 

	# hotend
	e_heater_pin=PB0,
	e_sensor_pin=PA1,

	# accel cs pin
	adxl345_cs_pin=PB1,
	adxl345_miso=PB2,
	adxl345_mosi=PB11,
	adxl345_clk=PB10
	
	# leveling
	bltouch_sensor_pin=PA5,
	bltouch_control_pin=PA4,
	probe_pin=PA5,

	# fans
	fan_part_cooling_pin=PB8,
	fan_toolhead_cooling_pin=PB4

	# filament sensors
	filament_sensor_runout_pin=PA10,
	filament_sensor_motion_pin=PA9,

[mcu toolboard]
serial: /dev/btt-ebb42-gen2-10

[adxl345 toolboard]
cs_pin: toolboard:adxl345_cs_pin
spi_bus:spi2_PB2_PB11_PB10

[temperature_sensor toolboard]
sensor_type: temperature_mcu
sensor_mcu: toolboard

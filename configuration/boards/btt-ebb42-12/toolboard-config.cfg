# WARNING. DO NOT EDIT THIS FILE.
# To override settings from this file, you can copy and paste the relevant
# sections into your printer.cfg and change it there.
# WARNING: it is NOT recommended to override board_pins aliases, 
# use the boards pin names directly in your printer.cfg instead. 
# Look up the pins you need in the boards pinout diagram.

[board_pins btt-ebb42-12]
mcu: toolboard
aliases:
	# endstop
	x_endstop_pin=PB6,

	# TMC2209
	e_step_pin=PD0,
	e_dir_pin=PD1,
	e_enable_pin=PD2,
	e_uart_pin=PA15,
	e_diag_pin=null, 
	
	# hotend
	e_heater_pin=PB13,
	e_sensor_pin=PA3,

	# thermocouple
	thermocouple_cs=PA4,
	thermocouple_miso=PA6,
	thermocouple_mosi=PA7,
	thermocouple_clk=PA5,

	# accel
	adxl345_cs_pin=PB12,
	adxl345_miso=PB2,
	adxl345_mosi=PB11,
	adxl345_clk=PB10,

	# leveling
	bltouch_sensor_pin=PB8,
	bltouch_control_pin=PB9,
	probe_pin=PB9,

	# fans
	fan_part_cooling_pin=PA0,
	fan_toolhead_cooling_pin=PA1

	# filament sensors
	filament_sensor_runout_pin=PB4,
	filament_sensor_motion_pin=PB3,

[mcu toolboard]
serial: /dev/btt-ebb42-12

[adxl345 toolboard]
cs_pin: toolboard:adxl345_cs_pin
spi_software_sclk_pin: toolboard: PB10
spi_software_mosi_pin: toolboard: PB11
spi_software_miso_pin: toolboard: PB2

[temperature_sensor toolboard]
sensor_type: temperature_mcu
sensor_mcu: toolboard
